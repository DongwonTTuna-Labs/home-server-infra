x-common-environment: &common-environment
  RUNNER_ORG: DongwonTTuna-Labs
  RUNNER_GROUP: Home Server Runners
  RUNNER_WORKDIR: /home/runner/_work
  RUNNER_TOOL_CACHE: /home/runner/_work/_tool
  RUNNER_TEMP: /home/runner/_work/_temp
  # Codex loop credentials, consumed directly by job run: steps (no GitHub
  # secrets). Sourced from ./.env (gitignored). See ../../.github/workflows/CODEX_LOOP.md.
  CODEX_RELAY_API_KEY: ${CODEX_RELAY_API_KEY:?set CODEX_RELAY_API_KEY in stacks/codex-github-runners/.env}
  CODEX_LOOP_PAT: ${CODEX_LOOP_PAT:?set CODEX_LOOP_PAT in stacks/codex-github-runners/.env}

x-runner-common: &runner-common
  image: dongwontuna-labs-runner:latest
  build:
    context: .
  secrets:
    - github_pat
  restart: unless-stopped
  mem_limit: 2g
  memswap_limit: 2g
  cpus: "1.50"
  pids_limit: 768
  shm_size: 256m
  # no-new-privileges is intentionally NOT set: openai/codex-action's
  # responses-api-proxy hardens its server-info file with `sudo chmod/chown`,
  # which the flag blocks. The runner image grants passwordless sudo for
  # exactly those two commands (see Dockerfile).
  tmpfs:
    - /tmp:rw,nosuid,nodev,size=512m

services:
  home-server-runner-01:
    <<: *runner-common
    container_name: home-server-runner-01
    environment:
      <<: *common-environment
      RUNNER_NAME: home-server-runner-01
      RUNNER_LABELS: dongwontuna-labs-runner,home-server-runner-01
    volumes:
      - home_server_runner_01_runner:/home/runner/actions-runner
      - home_server_runner_01_work:/home/runner/_work

  home-server-runner-02:
