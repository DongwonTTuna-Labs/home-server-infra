x-common-environment: &common-environment
  RUNNER_ORG: DongwonTTuna-Labs
  RUNNER_GROUP: Home Server Runners
  RUNNER_SCOPE_SLUG: home-server
  RUNNER_WORKDIR: /home/runner/_work
  CODEX_HOME: /home/runner/.codex
  CODEX_CLI_AUTO_UPDATE: ${CODEX_CLI_AUTO_UPDATE:-1}
  CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-latest}
  CODEX_RUNNER_LOCK_DIR: /var/lib/codex-runner/locks
  CODEX_RUNNER_MAX_PARALLEL: ${CODEX_RUNNER_MAX_PARALLEL:-8}
  RUNNER_TOOL_CACHE: /home/runner/_work/_tool
  RUNNER_TEMP: /home/runner/_work/_temp

x-runner-common: &runner-common
  image: codex-github-runner:latest
  build:
    context: .
  secrets:
    - github_pat
  restart: unless-stopped
  mem_limit: 2g
  memswap_limit: 2g
  cpus: "1.50"
  pids_limit: 768
  shm_size: 256m
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:rw,nosuid,nodev,size=512m

services:
  codex-runner-01:
    <<: *runner-common
    container_name: codex-runner-01
    environment:
      <<: *common-environment
      RUNNER_NAME: codex-01
      RUNNER_LABELS: codex,codex-01
    volumes:
      - codex_runner_locks:/var/lib/codex-runner/locks
      - codex_runner_01_runner:/home/runner/actions-runner
      - codex_runner_01_home:/home/runner/.codex
      - codex_runner_01_work:/home/runner/_work

  codex-runner-02:
    <<: *runner-common
    container_name: codex-runner-02
