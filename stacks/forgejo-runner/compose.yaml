name: forgejo-runner

services:
  docker-in-docker:
    image: docker:dind
    privileged: true
    restart: unless-stopped
    command: ["dockerd", "-H", "tcp://0.0.0.0:2375", "--tls=false"]

  runner:
    image: data.forgejo.org/forgejo/runner:4.0.0
    restart: unless-stopped
    depends_on:
      - docker-in-docker
    environment:
      DOCKER_HOST: tcp://docker-in-docker:2375
    user: "1001:1001"
    volumes:
      - ./runner/data:/data
      - ./runner-config.yaml:/data/config.yaml:ro
    command: /bin/sh -c "sleep 5; forgejo-runner daemon -c /data/config.yaml"
    networks:
      - default
      - forgejo

networks:
  forgejo:
    external: true
    name: forgejo_forgejo
