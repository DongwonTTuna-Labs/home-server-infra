name: opencode

services:
  opencode:
    image: ghcr.io/anomalyco/opencode:latest
    container_name: opencode
    pull_policy: always
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    # The image ENTRYPOINT is ["opencode"], so this runs `opencode web ...`.
    # web = headless server + browser UI. Clients: browser (any device) and
    # `opencode attach https://opencode.dongwontuna.net` (terminal TUI).
    command: ["web", "--hostname", "0.0.0.0", "--port", "4096"]
    working_dir: /workspace
    environment:
      # HTTP basic auth for the server. Applies to both browser and attach.
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:?set in stacks/opencode/.env}
      # Consumed by provider.ai-relay.options.apiKey ({env:...}) in opencode.json.
      CODEX_LB_LOCAL_API_KEY: ${CODEX_LB_LOCAL_API_KEY:?set in stacks/opencode/.env}
    ports:
      # Host-local only; public access is via the cloudflared tunnel below.
      # Handy for `opencode attach http://127.0.0.1:4096` on the host.
      - "127.0.0.1:4096:4096"
    networks:
      - opencode
    volumes:
      - ./opencode/opencode.json:/root/.config/opencode/opencode.json:ro
      - opencode-data:/root/.local/share/opencode
      - opencode-workspace:/workspace
      # Optional: let opencode clone/push private repos. Uncomment and provide
      # host credentials (read-only). Keep commented if you don't need git auth.
      # - ${HOME}/.ssh:/root/.ssh:ro
      # - ${HOME}/.gitconfig:/root/.gitconfig:ro

  # Dedicated tunnel for opencode.dongwontuna.net. Kept separate from codex-lb's
  # lifecycle so a watchtower recreate of opencode does not tear down the tunnel;
  # cloudflared just re-resolves the origin and reconnects.
  cloudflared-opencode:
    image: cloudflare/cloudflared:2026.5.0
    container_name: cloudflared-opencode
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    command: ["tunnel", "--no-autoupdate", "--config", "/etc/cloudflared/opencode.yml", "run"]
    depends_on:
      - opencode
    networks:
      - opencode
    volumes:
      - ./cloudflared/opencode.yml:/etc/cloudflared/opencode.yml:ro
      - ${HOME}/.cloudflared/opencode.json:/etc/cloudflared/opencode.json:ro

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower-opencode
    restart: unless-stopped
    command: ["--api-version", "1.40"]
    environment:
      TZ: Asia/Seoul
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCHEDULE: "0 0 9 * * *"
      WATCHTOWER_CLEANUP: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  opencode:

volumes:
  opencode-data:
  opencode-workspace:
