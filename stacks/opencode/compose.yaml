name: opencode

services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencode-home:latest
    container_name: opencode
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    command: ["web", "--hostname", "0.0.0.0", "--port", "4096"]
    working_dir: /workspace
    environment:
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:?set in stacks/opencode/.env}
      CODEX_LB_LOCAL_API_KEY: ${CODEX_LB_LOCAL_API_KEY:?set in stacks/opencode/.env}
    ports:
      - "127.0.0.1:4096:4096"
    networks:
      - opencode
    volumes:
      # Config mirrored from the laptop (read-only); opencode installs plugins
      # into the writable opencode-config volume alongside these files.
      - ./opencode/opencode.json:/root/.config/opencode/opencode.json:ro
      - ./opencode/oh-my-openagent.jsonc:/root/.config/opencode/oh-my-openagent.jsonc:ro
      - ./opencode/AGENTS.md:/root/.config/opencode/AGENTS.md:ro
      - opencode-config:/root/.config/opencode
      - opencode-cache:/root/.cache/opencode
      - opencode-data:/root/.local/share/opencode
      - opencode-workspace:/workspace
      # Optional git auth (not enabled): provide host credentials read-only.
      # - ${HOME}/.ssh:/root/.ssh:ro
      # - ${HOME}/.gitconfig:/root/.gitconfig:ro

  # Every 6h: self-update opencode and force the oh-my-openagent @latest plugin to
  # re-resolve, then restart opencode to apply — but only when opencode is idle,
  # so a running agent task is never interrupted. /session/status is "{}" when no
  # session is active; if busy, re-check every 10 min for up to 2h, else defer to
  # the next cycle. Uses the docker socket like the other stacks' watchtower.
  opencode-updater:
    image: docker:cli
    container_name: opencode-updater
    restart: unless-stopped
    depends_on:
      - opencode
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          sleep 21600
          i=0
          while [ "$$i" -lt 12 ]; do
            status=$$(docker exec opencode sh -c 'curl -s -u "opencode:$$OPENCODE_SERVER_PASSWORD" http://127.0.0.1:4096/session/status' 2>/dev/null)
            if [ "$$status" = "{}" ]; then
              docker exec opencode opencode upgrade || true
              docker exec opencode sh -c 'rm -rf /root/.cache/opencode/packages/oh-my-openagent@latest /root/.config/opencode/node_modules /root/.config/opencode/bun.lock' || true
              docker restart opencode || true
              break
            fi
            i=$$((i+1))
            sleep 600
          done
        done

  # Dedicated tunnel for opencode.dongwontuna.net. Runs as uid 1000 so it can read
  # the host-owned tunnel credentials (mode 600).
  cloudflared-opencode:
    image: cloudflare/cloudflared:2026.5.0
    user: "1000:1000"
    container_name: cloudflared-opencode
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    command: ["tunnel", "--no-autoupdate", "--config", "/etc/cloudflared/opencode.yml", "run"]
    depends_on:
      - opencode
    networks:
      - opencode
    volumes:
      - ./cloudflared/opencode.yml:/etc/cloudflared/opencode.yml:ro
      - ${HOME}/.cloudflared/opencode.json:/etc/cloudflared/opencode.json:ro

networks:
  opencode:

volumes:
  opencode-config:
  opencode-cache:
  opencode-data:
  opencode-workspace:
