# Tunnel `opencode` (created with `cloudflared tunnel create opencode`).
# The credentials JSON is host-only state, not committed (see docs/secrets.md);
# it is mounted from ${HOME}/.cloudflared/opencode.json by compose.yaml.
tunnel: 7a1eb69a-992a-4d3d-9eca-bf0e3c4cb916
credentials-file: /etc/cloudflared/opencode.json

ingress:
  - hostname: opencode.dongwontuna.net
    service: http://opencode:4096
  - service: http_status:404
