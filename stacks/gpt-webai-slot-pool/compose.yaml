name: gpt-webai-slot-pool

x-slot-env: &slot-env
  CHROME_NO_SANDBOX: "1"
  CHROME_BINARY_PATH: /usr/bin/chromium
  DISPLAY: ":99"

x-slot-common: &slot-common
  build:
    context: .
  image: home-server/gpt-webai-slot:latest
  restart: unless-stopped
  user: "${GPT_WEBAI_SLOT_UID:?set GPT_WEBAI_SLOT_UID}:${GPT_WEBAI_SLOT_GID:?set GPT_WEBAI_SLOT_GID}"
  shm_size: "1gb"
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  environment:
    <<: *slot-env
  healthcheck:
    test: ["CMD", "gpt-webai-slot-healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 20s

services:
  gpt-webai-slot-01:
    <<: *slot-common
    container_name: gpt-webai-slot-01
    environment:
      <<: *slot-env
      BROWSER_AGENT_HOME: /state/slot-01
      CDP_PORT: "9223"
    volumes:
      - ${GPT_WEBAI_STATE_DIR:-/home/dongwonttuna/.local/state/gpt-webai-lifecycle}/slots/slot-01/state:/state/slot-01
      - ${GPT_WEBAI_STATE_DIR:-/home/dongwonttuna/.local/state/gpt-webai-lifecycle}/slots/slot-01/attachments:/broker-attachments:ro

  gpt-webai-slot-02:
    <<: *slot-common
    container_name: gpt-webai-slot-02
    environment:
