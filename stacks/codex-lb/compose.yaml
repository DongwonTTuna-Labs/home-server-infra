name: codex-lb

services:
  codex-lb:
    image: codex-lb:oidc-pr4-d148d99
    build:
      context: https://github.com/DongwonTTuna-Labs/codex-lb.git#d148d99184e09c5ae0cbe18bd18b5ed5cef142fe
      dockerfile: Dockerfile
    container_name: codex-lb
    pull_policy: build
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    environment:
      CODEX_LB_CONNECT_ADDRESS: relay-ai.dongwontuna.net
      CODEX_LB_DATABASE_MIGRATE_ON_STARTUP: "true"
      CODEX_LB_DATABASE_SQLITE_PRE_MIGRATE_BACKUP_ENABLED: "true"
      CODEX_LB_DATABASE_SQLITE_PRE_MIGRATE_BACKUP_MAX_FILES: "5"
      CODEX_LB_DASHBOARD_AUTH_MODE: standard
      CODEX_LB_OIDC_FEDERATION_ENABLED: "true"
      CODEX_LB_LOG_FORMAT: text
    ports:
      - "127.0.0.1:2455:2455"
    volumes:
      - codex-lb-data:/var/lib/codex-lb

  github-oidc-broker:
    build: ./github-oidc-broker
    container_name: github-oidc-broker
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    environment:
      BROKER_AUDIENCE: https://relay-ai.dongwontuna.net/github-actions
      BROKER_ALLOWED_OWNER: DongwonTTuna-Labs
      BROKER_ALLOWED_REPOSITORIES: rs-builder-relayer-client,polymarket-liquidity-farming-rs,bioden
      BROKER_ALLOWED_WORKFLOWS: .github/workflows/codex-pr-review.yml,.github/workflows/resolve-checker.yml
      BROKER_ALLOWED_EVENTS: pull_request,pull_request_target,issue_comment,workflow_dispatch
      BROKER_ALLOWED_ACTORS: DongwonTTuna
      BROKER_ALLOWED_REFS: refs/heads/main
      BROKER_TOKEN_TTL_SECONDS: "3600"
      BROKER_API_KEY_COST_LIMIT_USD: "50"
      BROKER_API_KEY_COST_LIMIT_WINDOW: weekly
      BROKER_DB_PATH: /var/lib/github-oidc-broker/broker.db
    ports:
      - "127.0.0.1:2465:2465"
    volumes:
      - codex-lb-data:/var/lib/codex-lb:ro
      - github-oidc-broker-data:/var/lib/github-oidc-broker

  cloudflared-codex-lb:
    image: cloudflare/cloudflared:2026.5.0
    user: "1000:1000"
    container_name: cloudflared-codex-lb
    network_mode: host
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    command: ["--no-autoupdate", "tunnel", "--config", "/etc/cloudflared/codex-lb.yml", "--no-autoupdate", "--metrics", "127.0.0.1:20243", "run"]
    volumes:
      - ./cloudflared/codex-lb.yml:/etc/cloudflared/codex-lb.yml:ro
      - ${HOME}/.cloudflared/codex-lb.json:/etc/cloudflared/codex-lb.json:ro

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower-codex-lb
    restart: unless-stopped
    command: ["--api-version", "1.40"]
    environment:
      TZ: Asia/Seoul
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCHEDULE: "0 0 9 * * *"
      WATCHTOWER_CLEANUP: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  codex-lb-data:
    external: true
    name: codex-lb-data
  github-oidc-broker-data:
    name: github-oidc-broker-data
