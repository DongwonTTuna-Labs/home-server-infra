name: codex-lb

services:
  codex-lb:
    # Operator-verified pre-release, pinned by tag and OCI index digest.
    # Keep this service out of Watchtower and follow README.md for upgrades.
    image: ghcr.io/soju06/codex-lb:1.21.0-beta.2@sha256:fa931eee760f3a6e8875ef7347d24993c899fedbf261066783e162f633d659ab
    container_name: codex-lb
    pull_policy: missing
    restart: always
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    environment:
      CODEX_LB_CONNECT_ADDRESS: relay-ai.dongwontuna.net
      CODEX_LB_DATABASE_URL: postgresql+asyncpg://codex_lb:${CODEX_LB_POSTGRES_PASSWORD:?set in stacks/codex-lb/.env}@postgres:5432/codex_lb
      # Startup migration is intentional. A historical 1.19 rollback reused
      # revision 20260513 for two different physical schemas, so never stamp
      # that state by revision alone; use the README.md preflight matrix.
      CODEX_LB_DATABASE_MIGRATE_ON_STARTUP: "true"
      CODEX_LB_PROXY_ACCOUNT_STREAM_LIMIT: "50"
      # Request-path pool (max 100 conns) + separate background pool (max 20) so
      # background jobs can't starve request connections. Must stay under the PG
      # server's max_connections (set to 200 below).
      CODEX_LB_DATABASE_POOL_SIZE: "50"
      CODEX_LB_DATABASE_MAX_OVERFLOW: "50"
      CODEX_LB_DATABASE_BACKGROUND_POOL_SIZE: "10"
      CODEX_LB_DATABASE_BACKGROUND_MAX_OVERFLOW: "10"
      CODEX_LB_DASHBOARD_AUTH_MODE: standard
      CODEX_LB_LOG_FORMAT: text
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:2455:2455"
    networks:
      default:
      paca_mcp_internal:
    volumes:
      - codex-lb-data:/var/lib/codex-lb

  postgres:
    image: postgres:18
    container_name: codex-lb-postgres
    restart: always
    # Headroom above the app pools (main 100 + background 20 = 120 max clients).
    command: ["postgres", "-c", "max_connections=200"]
    labels:
      # Pin the DB engine: never let watchtower auto-jump a Postgres major.
      com.centurylinklabs.watchtower.enable: "false"
    environment:
      POSTGRES_DB: codex_lb
      POSTGRES_USER: codex_lb
      POSTGRES_PASSWORD: ${CODEX_LB_POSTGRES_PASSWORD:?set in stacks/codex-lb/.env}
    volumes:
      # PG18+ official image requires the mount at the parent dir; it stores data
      # in a major-version subdir (enables pg_upgrade --link). NOT /data.
      - codex-lb-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codex_lb -d codex_lb"]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  codex-lb-data:
    external: true
    name: codex-lb-data
  codex-lb-postgres-data:

networks:
  paca_mcp_internal:
    external: true
    name: paca_mcp_internal
