name: forgejo

networks:
  forgejo:
    external: false

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forgejo}
      POSTGRES_USER: ${POSTGRES_USER:-forgejo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    networks:
      - forgejo
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forgejo} -d ${POSTGRES_DB:-forgejo}"]
      interval: 10s
      timeout: 5s
      retries: 10

  forgejo:
    image: codeberg.org/forgejo/forgejo:15-rootless
    restart: unless-stopped
    user: "${FORGEJO_UID:-1000}:${FORGEJO_GID:-1000}"
    depends_on:
      db:
        condition: service_healthy
    environment:
      USER_UID: ${FORGEJO_UID:-1000}
      USER_GID: ${FORGEJO_GID:-1000}
      FORGEJO____APP_NAME: ${FORGEJO_APP_NAME:-DongwonTTuna Forge}
      FORGEJO____APP_SLOGAN: ${FORGEJO_APP_SLOGAN:-Code lives here.}
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: db:5432
      FORGEJO__database__NAME: ${POSTGRES_DB:-forgejo}
      FORGEJO__database__USER: ${POSTGRES_USER:-forgejo}
      FORGEJO__database__PASSWD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      FORGEJO__server__DOMAIN: ${FORGEJO_DOMAIN:?set FORGEJO_DOMAIN in .env}
      FORGEJO__server__ROOT_URL: ${FORGEJO_ROOT_URL:?set FORGEJO_ROOT_URL in .env}
      FORGEJO__server__SSH_DOMAIN: ${FORGEJO_SSH_DOMAIN:?set FORGEJO_SSH_DOMAIN in .env}
      FORGEJO__server__LANDING_PAGE: "explore"
      FORGEJO__server__DISABLE_SSH: "false"
      FORGEJO__server__START_SSH_SERVER: "true"
      FORGEJO__server__SSH_LISTEN_PORT: "2222"
      FORGEJO__server__SSH_PORT: "22"
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO__service__REQUIRE_SIGNIN_VIEW: "false"
      FORGEJO__service__REGISTER_EMAIL_CONFIRM: "true"
      FORGEJO__repository__ENABLE_PUSH_CREATE_USER: "false"
      FORGEJO__repository__ENABLE_PUSH_CREATE_ORG: "false"
      FORGEJO__actions__ENABLED: "true"
      FORGEJO__actions__DEFAULT_ACTIONS_URL: "https://data.forgejo.org"
      FORGEJO__migrations__ALLOWED_DOMAINS: "github.com"
    networks:
      - forgejo
    volumes:
      - ./forgejo:/var/lib/gitea
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:2222:2222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:3000/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 20
