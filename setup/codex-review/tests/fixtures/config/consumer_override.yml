# Example consumer override (rs-builder-relayer-client shape).
# Deep-merged over the generic trusted-core config.yml via --config-override or
# CODEX_REVIEW_CONFIG_OVERRIDE. Holds only repo-specific values; everything else
# inherits the generic defaults. No secrets belong here.
trusted:
  user: DongwonTTuna
  codex_review_authors:
    - codex-reviewer-for-dongwonttuna
    - codex-reviewer-for-dongwonttuna[bot]

autofix:
  forbidden_files:
    - Cargo.toml
    - Cargo.lock
  dangerous_keywords:
    - api key
    - auth
    - calldata
    - eip-712
    - exported
    - live-capable
    - nonce
    - private key
    - public api
    - secret
    - serde
    - signature
    - signing
    - wallet
    - wallet-create
    - wire

tests:
  allowlist:
    cargo_fmt: cargo fmt --all --check
    cargo_test: cargo test --workspace --all-features
  default_ids:
    - cargo_fmt
    - cargo_test
