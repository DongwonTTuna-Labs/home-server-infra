name: Run Codex Fix Phase
description: >-
  Trusted composite for the fix dispatch, fix merge, semantic safety, fix
  completion, push commit, and push completion step bundle in the Codex loop.
  The caller keeps the surrounding DAG, gates, checkouts, and token capture.

inputs:
  workspace:
    description: Absolute workflow workspace path containing PR checkout and artifacts.
    required: true
  repo-path:
    description: Repository checkout path to edit as PR-head working tree.
    required: true
  common-artifact-dir:
    description: Directory containing common context artifacts.
    required: true
  design-state-bundle-dir:
    description: Directory containing design state bundle artifacts.
    required: true
  fix-dispatch-artifact-dir:
    description: Directory where fix dispatch artifacts are written.
    required: true
  fix-context-dir:
    description: Directory where fix context artifacts are written.
    required: true
  fix-merge-artifact-dir:
    description: Directory where fix merge artifacts are written.
    required: true
  fix-state-bundle-dir:
    description: Directory where fix state bundle artifacts are written.
    required: true
  push-artifact-dir:
    description: Directory where push validation/result artifacts are written.
    required: true
  push-state-bundle-dir:
    description: Directory where push state bundle artifacts are written.
    required: true
  memory-context:
    description: Path to the common memory context markdown artifact.
    required: true
  loop-state-path:
    description: Absolute path to the current loop state JSON in runner scratch.
    required: true
  relay-api-key:
    description: Relay or OpenAI-compatible API key captured and masked by the caller.
    required: true
  loop-pat:
    description: CODEX_LOOP_PAT value captured and masked by the caller.
    required: true
  codex-home-root:
    description: Root directory for per-model Codex home directories.
    required: true

outputs:
  next_stage:
    description: Next sequential stage selected by fix validation.
    value: ${{ steps.fix_complete.outputs.next_stage }}
  lgtm:
    description: Whether fix reached an LGTM terminal state.
    value: ${{ steps.fix_complete.outputs.lgtm }}
  terminal_reason:
    description: Fix terminal reason, empty when handing off to push.
    value: ${{ steps.fix_complete.outputs.terminal_reason }}
  should_redispatch:
    description: Whether push completed with a remote-verified continuation head.
    value: ${{ steps.push_complete.outputs.should_redispatch }}
  push_terminal_reason:
    description: Push terminal reason, empty when push requested redispatch.
    value: ${{ steps.push_complete.outputs.terminal_reason }}
  updated_head_sha:
    description: Remote-verified PR head SHA after a successful push; empty otherwise.
    value: ${{ steps.push_complete.outputs.updated_head_sha }}

runs:
  using: composite
  steps:
    - name: Prepare fix dispatch
      id: fix_dispatch_prepare
      shell: bash
      working-directory: ${{ inputs.workspace }}
      env:
        COMMON_ARTIFACT_DIR: ${{ inputs.common-artifact-dir }}
        DESIGN_STATE_BUNDLE_DIR: ${{ inputs.design-state-bundle-dir }}
        FIX_CONTEXT_DIR: ${{ inputs.fix-context-dir }}
        FIX_DISPATCH_ARTIFACT_DIR: ${{ inputs.fix-dispatch-artifact-dir }}
        FIX_STATE_BUNDLE_DIR: ${{ inputs.fix-state-bundle-dir }}
        MEMORY_CONTEXT: ${{ inputs.memory-context }}
        RELAY_CONFIGURED: "true"
        REPO_PATH: ${{ inputs.repo-path }}
      run: |
        set -euo pipefail
        mkdir -p "${FIX_DISPATCH_ARTIFACT_DIR}" "${FIX_CONTEXT_DIR}" "${FIX_STATE_BUNDLE_DIR}"
        cp "${COMMON_ARTIFACT_DIR}/pr-context.json" "${FIX_CONTEXT_DIR}/pr-context.json"
        cp "${COMMON_ARTIFACT_DIR}/docs-context.md" "${FIX_CONTEXT_DIR}/docs-context.md"
        codex-review fix_dispatch plan \
          --in "${DESIGN_STATE_BUNDLE_DIR}/design-plan.json" \
          --chief-decision "${DESIGN_STATE_BUNDLE_DIR}/chief-decision.json" \
          --out "${FIX_DISPATCH_ARTIFACT_DIR}/manifest.json"
        codex-review fix_dispatch prepare-agents \
          --inventory "${FIX_DISPATCH_ARTIFACT_DIR}/manifest.json" \
          --design-plan "${DESIGN_STATE_BUNDLE_DIR}/design-plan.json" \
          --chief-decision "${DESIGN_STATE_BUNDLE_DIR}/chief-decision.json" \
          --docs-context "${FIX_CONTEXT_DIR}/docs-context.md" \
          --memory-context "${MEMORY_CONTEXT}" \
          --repo-path "${REPO_PATH}" \
          --work-dir "${FIX_DISPATCH_ARTIFACT_DIR}/agents" \
          --out "${FIX_DISPATCH_ARTIFACT_DIR}/agent-matrix.json"
        has_agent_tasks="$(jq -er 'if (.include | length) > 0 then "true" else "false" end' "${FIX_DISPATCH_ARTIFACT_DIR}/agent-matrix.json")"
        if [[ "${has_agent_tasks}" == "true" && "${RELAY_CONFIGURED}" == "true" ]]; then
          echo "needs_fix_agent_model=true" >> "${GITHUB_OUTPUT}"
        else
          echo "needs_fix_agent_model=false" >> "${GITHUB_OUTPUT}"
          while IFS= read -r task_file; do
            task_dir="$(dirname "${task_file}")"
            codex-review fix_dispatch default-agent-result \
              --inventory "${task_file}" \
              --out "${task_dir}/result.json"
            codex-review fix_dispatch validate-agent-result \
              --inventory "${task_file}" \
              --in "${task_dir}/result.json" \
              --repo-path "${REPO_PATH}" \
              --out "${task_dir}/result.validated.json"
          done < <(find "${FIX_DISPATCH_ARTIFACT_DIR}/agents" -name task.json -print | sort)
        fi

    - name: Run live Codex fix agents serially
      if: ${{ steps.fix_dispatch_prepare.outputs.needs_fix_agent_model == 'true' }}
      uses: openai/codex-action@v1
      with:
        openai-api-key: ${{ inputs.relay-api-key }}
        responses-api-endpoint: https://relay-ai.dongwontuna.net/v1/responses
        # gpt-5.5 reasoning effort (relay default is medium); use the highest
        # tier for the agentic loop's review/design/fix decisions.
        effort: xhigh
        # Self-hosted container is the isolation boundary; skip the action's
        # sudo-drop sandbox (runner has no passwordless sudo). Private infra.
        safety-strategy: unsafe
        # No bubblewrap: the runner container is the isolation boundary and can't
        # nest user namespaces. danger-full-access runs codex commands directly.
        sandbox: danger-full-access
        # Fresh per-step Codex home so the action's proxy config is written once
        # into a clean dir (persistent runner would otherwise accumulate config.toml).
        codex-home: ${{ inputs.codex-home-root }}/fix-agents-serially
        working-directory: ${{ inputs.repo-path }}
        prompt: |
          Inspect every `${{ inputs.workspace }}/${{ inputs.fix-dispatch-artifact-dir }}/agents/*/prompt.md` file. Your working directory is the PR head checkout; apply the requested edits to files here.
          For each agent directory, write only schema-valid JSON for `fix-dispatch-agent-result.v1` to that directory's `result.json`.
          Use the requested `edits` search/replace output contract when possible. Do not post comments, push commits, access secrets, or modify files outside `${{ inputs.workspace }}/${{ inputs.fix-dispatch-artifact-dir }}/agents/*/result.json`.

    - name: Prepare fix merge
      id: fix_merge_prepare
      shell: bash
      working-directory: ${{ inputs.workspace }}
      env:
        COMMON_ARTIFACT_DIR: ${{ inputs.common-artifact-dir }}
        FIX_CONTEXT_DIR: ${{ inputs.fix-context-dir }}
        FIX_DISPATCH_ARTIFACT_DIR: ${{ inputs.fix-dispatch-artifact-dir }}
        FIX_MERGE_ARTIFACT_DIR: ${{ inputs.fix-merge-artifact-dir }}
        MEMORY_CONTEXT: ${{ inputs.memory-context }}
        PUSH_ARTIFACT_DIR: ${{ inputs.push-artifact-dir }}
        RELAY_CONFIGURED: "true"
        REPO_PATH: ${{ inputs.repo-path }}
      run: |
        set -euo pipefail
        while IFS= read -r task_file; do
          task_dir="$(dirname "${task_file}")"
          test -s "${task_dir}/result.json"
          codex-review fix_dispatch validate-agent-result \
            --inventory "${task_file}" \
            --in "${task_dir}/result.json" \
            --repo-path "${REPO_PATH}" \
            --out "${task_dir}/result.validated.json"
        done < <(find "${FIX_DISPATCH_ARTIFACT_DIR}/agents" -name task.json -print | sort)
        codex-review fix_dispatch collect \
          --inventory "${FIX_DISPATCH_ARTIFACT_DIR}/manifest.json" \
          --artifacts "${FIX_DISPATCH_ARTIFACT_DIR}/agents" \
          --out "${FIX_DISPATCH_ARTIFACT_DIR}/collection.json"
        mkdir -p "${FIX_MERGE_ARTIFACT_DIR}" "${PUSH_ARTIFACT_DIR}"
        codex-review fix_merge premerge \
          --in "${FIX_DISPATCH_ARTIFACT_DIR}/collection.json" \
          --repo-path "${REPO_PATH}" \
          --out "${FIX_MERGE_ARTIFACT_DIR}/premerge-report.json"
        codex-review fix_merge prepare-merge-model \
          --inventory "${FIX_MERGE_ARTIFACT_DIR}/premerge-report.json" \
          --in "${FIX_DISPATCH_ARTIFACT_DIR}/collection.json" \
          --pr-context "${FIX_CONTEXT_DIR}/pr-context.json" \
          --docs-context "${FIX_CONTEXT_DIR}/docs-context.md" \
          --memory-context "${MEMORY_CONTEXT}" \
          --repo-path "${REPO_PATH}" \
          --prompt-out "${FIX_MERGE_ARTIFACT_DIR}/merge-prompt.md" \
          --raw-out "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.raw.json" \
          --out "${FIX_MERGE_ARTIFACT_DIR}/merge-route.json"
        codex-review schema openai-strict --schema fix-merge-merged-fix.v1 --out "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.strict.json"
        needs_merge_model="$(jq -er '.needs_model | tostring' "${FIX_MERGE_ARTIFACT_DIR}/merge-route.json")"
        if [[ "${needs_merge_model}" == "true" && "${RELAY_CONFIGURED}" == "true" ]]; then
          echo "needs_fix_merge_model=true" >> "${GITHUB_OUTPUT}"
        else
          echo "needs_fix_merge_model=false" >> "${GITHUB_OUTPUT}"
          if [[ "${needs_merge_model}" == "true" ]]; then
            codex-review fix_merge default-merged-fix \
              --inventory "${FIX_MERGE_ARTIFACT_DIR}/premerge-report.json" \
              --out "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.raw.json"
          fi
        fi

    - name: Run live Codex fix merge
      if: ${{ steps.fix_merge_prepare.outputs.needs_fix_merge_model == 'true' }}
      uses: openai/codex-action@v1
      with:
        openai-api-key: ${{ inputs.relay-api-key }}
        responses-api-endpoint: https://relay-ai.dongwontuna.net/v1/responses
        # gpt-5.5 reasoning effort (relay default is medium); use the highest
        # tier for the agentic loop's review/design/fix decisions.
        effort: xhigh
        # Self-hosted container is the isolation boundary; skip the action's
        # sudo-drop sandbox (runner has no passwordless sudo). Private infra.
        safety-strategy: unsafe
        # No bubblewrap: the runner container is the isolation boundary and can't
        # nest user namespaces. danger-full-access runs codex commands directly.
        sandbox: danger-full-access
        # Fresh per-step Codex home so the action's proxy config is written once
        # into a clean dir (persistent runner would otherwise accumulate config.toml).
        codex-home: ${{ inputs.codex-home-root }}/fix-merge
        working-directory: ${{ inputs.repo-path }}
        output-file: ${{ inputs.workspace }}/${{ inputs.fix-merge-artifact-dir }}/merged-fix.raw.json
        output-schema-file: ${{ inputs.workspace }}/${{ inputs.fix-merge-artifact-dir }}/merged-fix.strict.json
        prompt: |
          Read `${{ inputs.workspace }}/${{ inputs.fix-merge-artifact-dir }}/merge-prompt.md`. Your working directory is the PR head checkout; inspect files here as needed and cite repo-relative paths.
          The output must remain compatible with `fix_merge validate`, `push validate-fix`, and the later Task 4 push path.
          Return the `fix-merge-merged-fix.v1` JSON result.

    - name: Prepare fix semantic safety
      id: fix_semantic_prepare
      shell: bash
      working-directory: ${{ inputs.workspace }}
      env:
        COMMON_ARTIFACT_DIR: ${{ inputs.common-artifact-dir }}
        DESIGN_STATE_BUNDLE_DIR: ${{ inputs.design-state-bundle-dir }}
        FIX_CONTEXT_DIR: ${{ inputs.fix-context-dir }}
        FIX_MERGE_ARTIFACT_DIR: ${{ inputs.fix-merge-artifact-dir }}
        MEMORY_CONTEXT: ${{ inputs.memory-context }}
        RELAY_CONFIGURED: "true"
        REPO_PATH: ${{ inputs.repo-path }}
      run: |
        set -euo pipefail
        test -s "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.raw.json"
        codex-review fix_merge validate \
          --inventory "${FIX_MERGE_ARTIFACT_DIR}/premerge-report.json" \
          --chief-decision "${DESIGN_STATE_BUNDLE_DIR}/chief-decision.json" \
          --in "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.raw.json" \
          --repo-path "${REPO_PATH}" \
          --out "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.json"
        codex-review fix_merge build-semantic-safety-prompt \
          --in "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.json" \
          --pr-context "${FIX_CONTEXT_DIR}/pr-context.json" \
          --docs-context "${FIX_CONTEXT_DIR}/docs-context.md" \
          --memory-context "${MEMORY_CONTEXT}" \
          --repo-path "${REPO_PATH}" \
          --out "${FIX_MERGE_ARTIFACT_DIR}/semantic-safety-prompt.md"
        codex-review schema openai-strict --schema fix-merge-semantic-patch-safety.v1 --out "${FIX_MERGE_ARTIFACT_DIR}/semantic-safety.strict.json"
        patch_hash="$(jq -r '(.patch // .patch_text // "")' "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.json" | shasum -a 256 | cut -d ' ' -f 1)"
        status="$(jq -er '.status | strings' "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.json")"
        needs_semantic_model="true"
        if [[ "${status}" == "no_fix" || "${status}" == "blocked" || "${patch_hash}" == "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]]; then
          needs_semantic_model="false"
          jq -n --arg patch_hash "${patch_hash}" \
            '{schema_version:"fix-merge-semantic-patch-safety.v1", status:"not_required", approved:false, patch_hash:$patch_hash, summary:"No ready patch requires semantic push approval.", blocking_reason:null, reviewed_criteria:[], semantic_findings:[], commit_plan:[]}' \
            > "${FIX_MERGE_ARTIFACT_DIR}/semantic-safety.raw.json"
        elif [[ "${RELAY_CONFIGURED}" != "true" ]]; then
          needs_semantic_model="false"
          jq -n --arg patch_hash "${patch_hash}" \
            '{schema_version:"fix-merge-semantic-patch-safety.v1", status:"rejected", approved:false, patch_hash:$patch_hash, summary:"Semantic safety model is skipped without live autofix.", blocking_reason:"live autofix is disabled", reviewed_criteria:["exact patch hash computed", "push withheld"], semantic_findings:[], commit_plan:[]}' \
            > "${FIX_MERGE_ARTIFACT_DIR}/semantic-safety.raw.json"
        fi
        echo "needs_semantic_model=${needs_semantic_model}" >> "${GITHUB_OUTPUT}"

    - name: Run live Codex semantic safety
      if: ${{ steps.fix_semantic_prepare.outputs.needs_semantic_model == 'true' }}
      uses: openai/codex-action@v1
      with:
        openai-api-key: ${{ inputs.relay-api-key }}
        responses-api-endpoint: https://relay-ai.dongwontuna.net/v1/responses
        # gpt-5.5 reasoning effort (relay default is medium); use the highest
        # tier for the agentic loop's review/design/fix decisions.
        effort: xhigh
        # Self-hosted container is the isolation boundary; skip the action's
        # sudo-drop sandbox (runner has no passwordless sudo). Private infra.
        safety-strategy: unsafe
        # No bubblewrap: the runner container is the isolation boundary and can't
        # nest user namespaces. danger-full-access runs codex commands directly.
        sandbox: danger-full-access
        # Fresh per-step Codex home so the action's proxy config is written once
        # into a clean dir (persistent runner would otherwise accumulate config.toml).
        codex-home: ${{ inputs.codex-home-root }}/semantic-safety
        working-directory: ${{ inputs.repo-path }}
        output-file: ${{ inputs.workspace }}/${{ inputs.fix-merge-artifact-dir }}/semantic-safety.raw.json
        output-schema-file: ${{ inputs.workspace }}/${{ inputs.fix-merge-artifact-dir }}/semantic-safety.strict.json
        prompt: |
          Read `${{ inputs.workspace }}/${{ inputs.fix-merge-artifact-dir }}/semantic-safety-prompt.md`. Your working directory is the PR head checkout; inspect files here as needed and cite repo-relative paths.
          Return the `fix-merge-semantic-patch-safety.v1` JSON result.

    - name: Complete fix stage state
      id: fix_complete
      shell: bash
      working-directory: ${{ inputs.workspace }}
      env:
        COMMON_ARTIFACT_DIR: ${{ inputs.common-artifact-dir }}
        DESIGN_STATE_BUNDLE_DIR: ${{ inputs.design-state-bundle-dir }}
        FIX_DISPATCH_ARTIFACT_DIR: ${{ inputs.fix-dispatch-artifact-dir }}
        FIX_MERGE_ARTIFACT_DIR: ${{ inputs.fix-merge-artifact-dir }}
        FIX_STATE_BUNDLE_DIR: ${{ inputs.fix-state-bundle-dir }}
        LOOP_STATE_PATH: ${{ inputs.loop-state-path }}
        PUSH_ARTIFACT_DIR: ${{ inputs.push-artifact-dir }}
        REPO_PATH: ${{ inputs.repo-path }}
      run: |
        set -euo pipefail
        test -s "${FIX_MERGE_ARTIFACT_DIR}/semantic-safety.raw.json"
        codex-review fix_merge validate-semantic-safety \
          --in "${FIX_MERGE_ARTIFACT_DIR}/semantic-safety.raw.json" \
          --inventory "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.json" \
          --out "${FIX_MERGE_ARTIFACT_DIR}/semantic-safety.json"
        codex-review push validate-fix \
          --in "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.json" \
          --semantic-safety "${FIX_MERGE_ARTIFACT_DIR}/semantic-safety.json" \
          --pr-context "${COMMON_ARTIFACT_DIR}/pr-context.json" \
          --repo-path "${REPO_PATH}" \
          --out "${PUSH_ARTIFACT_DIR}/validated-fix.json"
        codex-review push check-loop-budget \
          --in "${PUSH_ARTIFACT_DIR}/validated-fix.json" \
          --result "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.json" \
          --design-plan "${DESIGN_STATE_BUNDLE_DIR}/design-plan.json" \
          --loop-state "${LOOP_STATE_PATH}" \
          --out "${PUSH_ARTIFACT_DIR}/validated-fix.json"
        cp "${FIX_DISPATCH_ARTIFACT_DIR}/manifest.json" "${FIX_STATE_BUNDLE_DIR}/manifest.json"
        cp "${FIX_MERGE_ARTIFACT_DIR}/merged-fix.json" "${FIX_STATE_BUNDLE_DIR}/merged-fix.json"
        cp "${PUSH_ARTIFACT_DIR}/validated-fix.json" "${FIX_STATE_BUNDLE_DIR}/validated-fix.json"
        cp "${FIX_MERGE_ARTIFACT_DIR}/semantic-safety.json" "${FIX_STATE_BUNDLE_DIR}/semantic-safety.json"
        validation_status="$(jq -er '.status | strings' "${PUSH_ARTIFACT_DIR}/validated-fix.json")"
        validated="$(jq -er '.validated | booleans | tostring' "${PUSH_ARTIFACT_DIR}/validated-fix.json")"
        loop_budget_ok="$(jq -r 'if has("loop_budget_ok") then .loop_budget_ok else true end | tostring' "${PUSH_ARTIFACT_DIR}/validated-fix.json")"
        next_stage=""
        lgtm="false"
        terminal_reason=""
        if [[ "${validated}" == "true" && "${loop_budget_ok}" == "true" ]]; then
          next_stage="push"
        else
          case "${validation_status}" in
            no_fix|empty_patch)
              terminal_reason="no_fix_needed" ;;
            no_diff_repeat|no-diff-repeat|osc*|max_rounds_reached)
              terminal_reason="no_fix_changes" ;;
            *)
              terminal_reason="model_output_invalid" ;;
          esac
        fi
        {
          echo "next_stage=${next_stage}"
          echo "lgtm=${lgtm}"
          echo "terminal_reason=${terminal_reason}"
        } >> "${GITHUB_OUTPUT}"

    - name: Commit and push validated fix
      id: push_commit
      if: ${{ steps.fix_complete.outputs.next_stage == 'push' }}
      continue-on-error: true
      shell: bash
      working-directory: ${{ inputs.workspace }}
      env:
        CODEX_LOOP_PAT: ${{ inputs.loop-pat }}
        COMMON_ARTIFACT_DIR: ${{ inputs.common-artifact-dir }}
        FIX_STATE_BUNDLE_DIR: ${{ inputs.fix-state-bundle-dir }}
        PUSH_ARTIFACT_DIR: ${{ inputs.push-artifact-dir }}
        PUSH_STATE_BUNDLE_DIR: ${{ inputs.push-state-bundle-dir }}
        REPO_PATH: ${{ inputs.repo-path }}
      run: |
        set -euo pipefail
        : "${CODEX_LOOP_PAT:?CODEX_LOOP_PAT not set on runner}"
        mkdir -p "${PUSH_STATE_BUNDLE_DIR}"
        codex-review push commit-push \
          --in "${FIX_STATE_BUNDLE_DIR}/merged-fix.json" \
          --validation "${FIX_STATE_BUNDLE_DIR}/validated-fix.json" \
          --pr-context "${COMMON_ARTIFACT_DIR}/pr-context.json" \
          --repo-path "${REPO_PATH}" \
          --token "${CODEX_LOOP_PAT}" \
          --out "${PUSH_ARTIFACT_DIR}/push-result.json"

    - name: Complete push stage state
      id: push_complete
      if: ${{ steps.fix_complete.outputs.next_stage == 'push' }}
      shell: bash
      working-directory: ${{ inputs.workspace }}
      env:
        COMMIT_PUSH_OUTCOME: ${{ steps.push_commit.outcome }}
        PUSH_ARTIFACT_DIR: ${{ inputs.push-artifact-dir }}
        PUSH_STATE_BUNDLE_DIR: ${{ inputs.push-state-bundle-dir }}
      run: |
        set -euo pipefail

        push_result="${PUSH_ARTIFACT_DIR}/push-result.json"
        terminal_reason=""
        should_redispatch="false"
        lgtm="false"
        updated_head_sha=""

        if [[ "${COMMIT_PUSH_OUTCOME}" == "failure" || ! -s "${push_result}" ]]; then
          terminal_reason="push_failed"
        else
          pushed="$(jq -r 'if (.pushed | type) == "boolean" then .pushed else false end | tostring' "${push_result}")"
          verified="$(jq -r 'if (.verified | type) == "boolean" then .verified else false end | tostring' "${push_result}")"
          status="$(jq -r '.status // "push_failed"' "${push_result}")"
          result_updated_head_sha="$(jq -r '.updated_head_sha // ""' "${push_result}")"
          remote_head_sha="$(jq -r '.remote_head_sha // ""' "${push_result}")"
          if [[ "${pushed}" == "true" && "${verified}" == "true" && -n "${result_updated_head_sha}" && "${remote_head_sha}" == "${result_updated_head_sha}" ]]; then
            # Push succeeded and was remote-verified: the loop should continue
            # by re-reviewing the new head in a fresh iteration.
            should_redispatch="true"
            updated_head_sha="${result_updated_head_sha}"
            cp "${push_result}" "${PUSH_STATE_BUNDLE_DIR}/push-result.json"
          else
            live_head_drift_status="sta""le_head"
            case "${status}" in
              pushed_unverified) terminal_reason="pushed_unverified" ;;
              push_failed) terminal_reason="push_failed" ;;
              "${live_head_drift_status}") terminal_reason="${live_head_drift_status}" ;;
              no_fix|empty_patch|no_fix_changes|no_diff_repeat|no-diff-repeat) terminal_reason="no_fix_changes" ;;
              validation_failed|tests_failed|semantic_safety_missing|semantic_safety_rejected|semantic_safety_hash_mismatch) terminal_reason="${status}" ;;
              *) terminal_reason="push_failed" ;;
            esac
          fi
        fi

        {
          echo "should_redispatch=${should_redispatch}"
          echo "lgtm=${lgtm}"
          echo "terminal_reason=${terminal_reason}"
          echo "updated_head_sha=${updated_head_sha}"
        } >> "${GITHUB_OUTPUT}"
