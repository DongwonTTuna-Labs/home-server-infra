name: Classify Codex Memory Change
description: Classify whether a Codex loop iteration is a guarded memory-only no-op.

inputs:
  workspace:
    description: Absolute workflow workspace path containing the PR checkout.
    required: true
  repo-path:
    description: Repository checkout path to inspect as PR-head data.
    required: true
  head-sha:
    description: Pull request head SHA to classify.
    required: true
  github-actor:
    description: GitHub actor for the current workflow run.
    required: true
  requested-by:
    description: Actor or app slug that requested this loop iteration.
    required: true
  own-actors:
    description: Comma-separated actor/app slugs trusted as Codex memory writers.
    required: true
  output-path:
    description: Path where the JSON classification artifact is written.
    required: true

outputs:
  memory_only:
    description: Whether the diff is a guarded memory-only Codex change.
    value: ${{ steps.classify.outputs.memory_only }}
  should_run_model:
    description: Whether downstream model work should run.
    value: ${{ steps.classify.outputs.should_run_model }}
  classification_reason:
    description: Machine-readable memory classification reason.
    value: ${{ steps.classify.outputs.classification_reason }}
  codex_memory_marker:
    description: Whether the head commit has the codex-memory marker.
    value: ${{ steps.classify.outputs.codex_memory_marker }}
  actor_guard:
    description: Whether actor/requester matches configured own actors.
    value: ${{ steps.classify.outputs.actor_guard }}

runs:
  using: composite
  steps:
    - name: Classify memory-only diff
      id: classify
      shell: bash
      working-directory: ${{ inputs.workspace }}
      env:
        CODEX_LOOP_GITHUB_ACTOR: ${{ inputs.github-actor }}
        CODEX_LOOP_OWN_ACTORS: ${{ inputs.own-actors }}
        CODEX_LOOP_REQUESTED_BY: ${{ inputs.requested-by }}
        INPUT_HEAD_SHA: ${{ inputs.head-sha }}
        OUTPUT_PATH: ${{ inputs.output-path }}
        REPO_PATH: ${{ inputs.repo-path }}
      run: |
        set -euo pipefail

        base_sha=""
        if base_sha="$(git -C "${REPO_PATH}" rev-parse "${INPUT_HEAD_SHA}^" 2>/dev/null)"; then
          :
        else
          base_sha=""
        fi

        codex-review loop memory-only-change \
          --base "${base_sha}" \
          --head "${INPUT_HEAD_SHA}" \
          --repo-path "${REPO_PATH}" \
          --out "${OUTPUT_PATH}"

    - name: Summarize memory-only classification
      shell: bash
      working-directory: ${{ inputs.workspace }}
      env:
        ACTOR_GUARD: ${{ steps.classify.outputs.actor_guard }}
        CLASSIFICATION_REASON: ${{ steps.classify.outputs.classification_reason }}
        CODEX_MEMORY_MARKER: ${{ steps.classify.outputs.codex_memory_marker }}
        MEMORY_ONLY: ${{ steps.classify.outputs.memory_only }}
        SHOULD_RUN_MODEL: ${{ steps.classify.outputs.should_run_model }}
      run: |
        set -euo pipefail
        {
          echo "## Codex loop memory-only classification"
          echo "memory_only=${MEMORY_ONLY}"
          echo "should_run_model=${SHOULD_RUN_MODEL}"
          echo "reason=${CLASSIFICATION_REASON}"
          echo "codex-memory marker=${CODEX_MEMORY_MARKER}"
          echo "actor_guard=${ACTOR_GUARD}"
        } >> "${GITHUB_STEP_SUMMARY}"
