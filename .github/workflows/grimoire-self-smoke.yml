name: Grimoire Self Smoke

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]
  push:
    branches: [main]

permissions: {}

jobs:
  self-smoke:
    name: Deterministic Grimoire signal self-smoke
    runs-on:
      group: Home Server Runners
      labels: dongwontuna-labs-runner
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout control plane under test
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run deterministic signal-layer self-smoke
        shell: bash
        run: |
          set -euo pipefail
          python3 actions/grimoire/cast/scripts/self_smoke.py --control-plane-root "$PWD"
