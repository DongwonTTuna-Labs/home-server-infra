name: Codex Loop Reusable Core

# Thin orchestrator module map:
# - memory classify: .github/actions/codex-memory-classify
# - context: .github/actions/codex-context
# - review/techlead: .github/actions/codex-review-phase
# - design/design-chief: .github/actions/codex-design-phase
# - fix/push: .github/actions/codex-fix-phase

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to process.
        type: number
        required: true
      head_sha:
        description: Expected pull request head SHA.
        type: string
        required: true
      base_ref:
        description: Expected pull request base ref.
        type: string
        required: true
      iteration:
        description: Zero-based loop iteration.
        type: number
        required: true
      correlation_id:
        description: Stable loop correlation id.
        type: string
        required: true
      requested_by:
        description: GitHub actor or app slug that requested this step.
        type: string
        required: true
    # No secrets: credentials (CODEX_RELAY_API_KEY, CODEX_LOOP_PAT) are provided as
    # environment variables on the self-hosted org runners. See CODEX_LOOP.md.
    outputs:
      lgtm:
        description: Whether the run reached an LGTM terminal state.
        value: ${{ jobs.finalize.outputs.lgtm }}
      should_redispatch:
        description: Whether the loop continued with a new iteration dispatch.
        value: ${{ jobs.finalize.outputs.should_redispatch }}
      terminal_reason:
        description: Empty for non-terminal continuation, otherwise the terminal reason.
        value: ${{ jobs.finalize.outputs.terminal_reason }}
      updated_head_sha:
        description: Remote-verified PR head SHA after a successful push; empty otherwise.
        value: ${{ jobs.finalize.outputs.updated_head_sha }}

permissions: {}

concurrency:
  group: codex-loop-${{ inputs.correlation_id }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Inputs
    runs-on:
      group: "Home Server Runners"
      labels: dongwontuna-labs-runner
    permissions:
      contents: read
      pull-requests: read
    outputs:
      valid: ${{ steps.validate_payload.outputs.valid }}
      terminal_reason: ${{ steps.validate_payload.outputs.terminal_reason }}
      iteration: ${{ steps.validate_payload.outputs.iteration }}
    steps:
      - name: Validate payload schema
        id: validate_payload
        shell: bash
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          INPUT_BASE_REF: ${{ inputs.base_ref }}
          INPUT_ITERATION: ${{ inputs.iteration }}
          INPUT_CORRELATION_ID: ${{ inputs.correlation_id }}
          INPUT_REQUESTED_BY: ${{ inputs.requested_by }}
        run: |
          set -euo pipefail

          terminal_reason=""
          valid="true"

          require_non_empty() {
            local name="$1"
            local value="$2"
            if [[ -z "${value}" ]]; then
              terminal_reason="missing-${name}"
              valid="false"
            fi
          }

          require_non_empty pr_number "${INPUT_PR_NUMBER}"
          require_non_empty head_sha "${INPUT_HEAD_SHA}"
          require_non_empty base_ref "${INPUT_BASE_REF}"
          require_non_empty iteration "${INPUT_ITERATION}"
          require_non_empty correlation_id "${INPUT_CORRELATION_ID}"
          require_non_empty requested_by "${INPUT_REQUESTED_BY}"

          if [[ "${valid}" == "true" ]]; then
            if ! [[ "${INPUT_ITERATION}" =~ ^[0-9]+$ ]]; then
              terminal_reason="invalid-iteration"
              valid="false"
            fi
          fi

          {
            echo "valid=${valid}"
            echo "terminal_reason=${terminal_reason}"
            echo "iteration=${INPUT_ITERATION}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Codex loop validation"
            echo "payload schema: workflow_call typed inputs"
            echo "iteration=${INPUT_ITERATION}"
            echo "valid=${valid}"
            if [[ -n "${terminal_reason}" ]]; then
              echo "terminal_reason=${terminal_reason}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${valid}" != "true" ]]; then
            exit 1
          fi

  setup-state:
    name: Setup Codex State
    needs: [validate]
    if: ${{ needs.validate.outputs.valid == 'true' }}
    runs-on:
      group: "Home Server Runners"
      labels: dongwontuna-labs-runner
    permissions:
      contents: read
      pull-requests: read
      actions: read
    outputs:
      state_artifact_name: ${{ steps.state.outputs.state_artifact_name }}
    steps:
      - name: Checkout target base reference
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.base_ref }}
          path: target-base
          persist-credentials: false

      - name: Checkout PR head data
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.head_sha }}
          path: pr-head
          persist-credentials: false

      - name: Setup trusted codex-review helper
        id: setup_codex
        uses: DongwonTTuna-Labs/home-server-infra/.github/actions/setup-codex-review@main

      - name: Bootstrap loop state artifact
        id: state
        shell: bash
        env:
          INPUT_CORRELATION_ID: ${{ inputs.correlation_id }}
          INPUT_ITERATION: ${{ inputs.iteration }}
        run: |
          set -euo pipefail

          # Single-run sequential loop: each iteration bootstraps a fresh
          # loop-state; cross-stage state is read directly from the in-run
          # workspace bundles, not a cross-run state-pointer artifact.
          codex-review loop read-state --out "${RUNNER_TEMP}/codex-loop-state.json"

          artifact_name="codex-loop-state-${INPUT_CORRELATION_ID}-${INPUT_ITERATION}.json"
          echo "state_artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload current loop state artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.state.outputs.state_artifact_name }}
          path: ${{ runner.temp }}/codex-loop-state.json
          retention-days: 7

  classify:
    name: Classify Memory-Only Change
    needs: [validate, setup-state]
    if: ${{ always() && needs.validate.outputs.valid == 'true' && needs.setup-state.result == 'success' }}
    runs-on:
      group: "Home Server Runners"
      labels: dongwontuna-labs-runner
    permissions:
      contents: read
      pull-requests: read
      actions: read
    outputs:
      memory_only: ${{ steps.classify.outputs.memory_only }}
      should_run_model: ${{ steps.classify.outputs.should_run_model }}
      classification_reason: ${{ steps.classify.outputs.classification_reason }}
      codex_memory_marker: ${{ steps.classify.outputs.codex_memory_marker }}
      actor_guard: ${{ steps.classify.outputs.actor_guard }}
    steps:
      - name: Checkout PR head data
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.head_sha }}
          path: pr-head
          fetch-depth: 2
          persist-credentials: false

      - name: Checkout trusted workflow source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: trusted-core
          persist-credentials: false

      - name: Setup trusted codex-review helper
        id: setup_codex
        uses: DongwonTTuna-Labs/home-server-infra/.github/actions/setup-codex-review@main

      - name: Classify memory-only diff
        id: classify
        uses: ./trusted-core/.github/actions/codex-memory-classify
        with:
          workspace: ${{ github.workspace }}
          repo-path: pr-head
          head-sha: ${{ inputs.head_sha }}
          github-actor: ${{ github.actor }}
          requested-by: ${{ inputs.requested_by }}
          own-actors: ${{ vars.CODEX_LOOP_OWN_ACTORS || 'github-actions[bot]' }}
          output-path: ${{ runner.temp }}/codex-memory-only-change.json

  run-stage:
    name: Run Stage
    needs: [validate, setup-state, classify]
    if: ${{ always() && needs.validate.outputs.valid == 'true' && needs.setup-state.result == 'success' && needs.classify.outputs.should_run_model == 'true' }}
    runs-on:
      group: "Home Server Runners"
      labels: dongwontuna-labs-runner
    permissions:
      contents: read
      pull-requests: read
      actions: read
    outputs:
      lgtm: ${{ steps.stage_outputs.outputs.lgtm }}
      should_redispatch: ${{ steps.stage_outputs.outputs.should_redispatch }}
      terminal_reason: ${{ steps.stage_outputs.outputs.terminal_reason }}
      updated_head_sha: ${{ steps.stage_outputs.outputs.updated_head_sha }}
    steps:
      - name: Checkout PR head data
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.head_sha }}
          path: pr-head
          persist-credentials: false

      - name: Checkout trusted workflow source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: trusted-core
          persist-credentials: false

      - name: Setup trusted codex-review helper
        id: setup_codex
        uses: DongwonTTuna-Labs/home-server-infra/.github/actions/setup-codex-review@main

      - name: Download setup loop state artifact
        uses: actions/download-artifact@v4
        with:
          name: codex-loop-state-${{ inputs.correlation_id }}-${{ inputs.iteration }}.json
          path: ${{ runner.temp }}

      - name: Prepare common context
        id: codex_context
        uses: ./trusted-core/.github/actions/codex-context
        with:
          workspace: ${{ github.workspace }}
          repo-path: pr-head
          artifact-dir: codex-review-artifacts/common
          repository: ${{ github.repository }}
          pr-number: ${{ inputs.pr_number }}
          head-sha: ${{ inputs.head_sha }}
          base-ref: ${{ inputs.base_ref }}
          github-token: ${{ github.token }}

      - name: Read relay API key from runner environment
        id: relay_key
        shell: bash
        run: |
          set -euo pipefail
          : "${CODEX_RELAY_API_KEY:?CODEX_RELAY_API_KEY not set on runner}"
          echo "::add-mask::${CODEX_RELAY_API_KEY}"
          echo "key=${CODEX_RELAY_API_KEY}" >> "${GITHUB_OUTPUT}"

      - name: Run review phase
        id: review_complete
        uses: ./trusted-core/.github/actions/codex-review-phase
        with:
          workspace: ${{ github.workspace }}
          repo-path: pr-head
          common-artifact-dir: codex-review-artifacts/common
          review-artifact-dir: codex-review-artifacts/review
          review-state-bundle-dir: codex-review-artifacts/review-state-bundle
          memory-context: codex-review-artifacts/common/memory-context.md
          relay-api-key: ${{ steps.relay_key.outputs.key }}
          codex-home-root: ${{ runner.temp }}/codex-home

      - name: Run design phase
        id: design_complete
        if: ${{ steps.review_complete.outputs.next_stage == 'design' }}
        uses: ./trusted-core/.github/actions/codex-design-phase
        with:
          workspace: ${{ github.workspace }}
          repo-path: pr-head
          common-artifact-dir: codex-review-artifacts/common
          review-state-bundle-dir: codex-review-artifacts/review-state-bundle
          design-artifact-dir: codex-review-artifacts/design
          design-state-bundle-dir: codex-review-artifacts/design-state-bundle
          memory-context: codex-review-artifacts/common/memory-context.md
          relay-api-key: ${{ steps.relay_key.outputs.key }}
          codex-home-root: ${{ runner.temp }}/codex-home

      - name: Read loop PAT from runner environment
        id: loop_pat
        if: ${{ steps.design_complete.outputs.next_stage == 'fix' }}
        shell: bash
        run: |
          set -euo pipefail
          loop_pat="${CODEX_LOOP_PAT:-}"
          if [[ -n "${loop_pat}" ]]; then
            echo "::add-mask::${loop_pat}"
          fi
          echo "token=${loop_pat}" >> "${GITHUB_OUTPUT}"

      - name: Run fix phase
        id: fix_complete
        if: ${{ steps.design_complete.outputs.next_stage == 'fix' }}
        uses: ./trusted-core/.github/actions/codex-fix-phase
        with:
          workspace: ${{ github.workspace }}
          repo-path: pr-head
          common-artifact-dir: codex-review-artifacts/common
          design-state-bundle-dir: codex-review-artifacts/design-state-bundle
          fix-dispatch-artifact-dir: codex-review-artifacts/fix_dispatch
          fix-context-dir: codex-review-artifacts/fix-context
          fix-merge-artifact-dir: codex-review-artifacts/fix_merge
          fix-state-bundle-dir: codex-review-artifacts/fix-state-bundle
          push-artifact-dir: codex-review-artifacts/push
          push-state-bundle-dir: codex-review-artifacts/push-state-bundle
          memory-context: codex-review-artifacts/common/memory-context.md
          loop-state-path: ${{ runner.temp }}/codex-loop-state.json
          relay-api-key: ${{ steps.relay_key.outputs.key }}
          loop-pat: ${{ steps.loop_pat.outputs.token }}
          codex-home-root: ${{ runner.temp }}/codex-home

      - name: Resolve final stage outcome
        id: stage_outputs
        shell: bash
        env:
          REVIEW_NEXT_STAGE: ${{ steps.review_complete.outputs.next_stage }}
          REVIEW_LGTM: ${{ steps.review_complete.outputs.lgtm }}
          REVIEW_TERMINAL_REASON: ${{ steps.review_complete.outputs.terminal_reason }}
          DESIGN_NEXT_STAGE: ${{ steps.design_complete.outputs.next_stage }}
          DESIGN_TERMINAL_REASON: ${{ steps.design_complete.outputs.terminal_reason }}
          FIX_NEXT_STAGE: ${{ steps.fix_complete.outputs.next_stage }}
          FIX_TERMINAL_REASON: ${{ steps.fix_complete.outputs.terminal_reason }}
          PUSH_REDISPATCH: ${{ steps.fix_complete.outputs.should_redispatch }}
          PUSH_TERMINAL_REASON: ${{ steps.fix_complete.outputs.push_terminal_reason }}
          PUSH_UPDATED_HEAD_SHA: ${{ steps.fix_complete.outputs.updated_head_sha }}
        run: |
          set -euo pipefail

          # The last stage that executed determines the run's outcome. Walk the
          # sequential chain review -> design -> fix -> push and stop at the first
          # stage that did not hand off to the next.
          lgtm="false"
          should_redispatch="false"
          terminal_reason=""
          updated_head_sha=""

          if [[ "${PUSH_TERMINAL_REASON}" != "" || "${PUSH_REDISPATCH}" == "true" ]]; then
            # Push stage ran (review->design->fix->push all handed off).
            should_redispatch="${PUSH_REDISPATCH:-false}"
            terminal_reason="${PUSH_TERMINAL_REASON:-}"
            updated_head_sha="${PUSH_UPDATED_HEAD_SHA:-}"
          elif [[ "${FIX_NEXT_STAGE}" == "push" ]]; then
            # Fix handed off to push but push produced no decision: treat as failure.
            terminal_reason="push_failed"
          elif [[ "${FIX_TERMINAL_REASON}" != "" ]]; then
            terminal_reason="${FIX_TERMINAL_REASON}"
          elif [[ "${DESIGN_NEXT_STAGE}" == "fix" ]]; then
            terminal_reason="model_output_invalid"
          elif [[ "${DESIGN_TERMINAL_REASON}" != "" ]]; then
            terminal_reason="${DESIGN_TERMINAL_REASON}"
          elif [[ "${REVIEW_NEXT_STAGE}" == "design" ]]; then
            terminal_reason="model_output_invalid"
          elif [[ "${REVIEW_LGTM}" == "true" ]]; then
            lgtm="true"
          else
            terminal_reason="${REVIEW_TERMINAL_REASON:-model_output_invalid}"
          fi

          {
            echo "lgtm=${lgtm}"
            echo "should_redispatch=${should_redispatch}"
            echo "terminal_reason=${terminal_reason}"
            echo "updated_head_sha=${updated_head_sha}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Codex loop run"
            echo "lgtm=${lgtm}"
            echo "should_redispatch=${should_redispatch}"
            echo "terminal_reason=${terminal_reason}"
            echo "updated_head_sha=${updated_head_sha}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Record non-pushed terminal review memory
        id: terminal_memory
        if: ${{ always() && steps.stage_outputs.outputs.should_redispatch != 'true' && (steps.stage_outputs.outputs.lgtm == 'true' || steps.stage_outputs.outputs.terminal_reason != '') }}
        continue-on-error: true
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          COMMON_ARTIFACT_DIR: codex-review-artifacts/common
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          LOOP_STATE_PATH: ${{ runner.temp }}/codex-loop-state.json
          REPO_PATH: pr-head
          TERMINAL_LGTM: ${{ steps.stage_outputs.outputs.lgtm }}
          TERMINAL_REASON: ${{ steps.stage_outputs.outputs.terminal_reason }}
          TERMINAL_SHOULD_REDISPATCH: ${{ steps.stage_outputs.outputs.should_redispatch }}
          TERMINAL_UPDATED_HEAD_SHA: ${{ steps.stage_outputs.outputs.updated_head_sha }}
        run: |
          set -euo pipefail

          if [[ "${TERMINAL_SHOULD_REDISPATCH}" == "true" ]]; then
            echo "terminal memory skipped: pushed continuation"
            exit 0
          fi
          if [[ "${TERMINAL_LGTM}" != "true" && -z "${TERMINAL_REASON}" ]]; then
            echo "terminal memory skipped: non-terminal outcome"
            exit 0
          fi

          loop_pat="${CODEX_LOOP_PAT:-}"
          if [[ -n "${loop_pat}" ]]; then
            echo "::add-mask::${loop_pat}"
          fi

          mkdir -p codex-review-artifacts/terminal-memory
          terminal_status="${TERMINAL_REASON}"
          terminal_reason="${TERMINAL_REASON}"
          lgtm_json="false"
          if [[ "${TERMINAL_LGTM}" == "true" ]]; then
            terminal_status="lgtm"
            terminal_reason="${terminal_reason:-lgtm}"
            lgtm_json="true"
          fi

          jq -n \
            --arg status "${terminal_status}" \
            --arg terminal_reason "${terminal_reason}" \
            --arg head_sha "${INPUT_HEAD_SHA}" \
            --arg updated_head_sha "${TERMINAL_UPDATED_HEAD_SHA}" \
            --argjson lgtm "${lgtm_json}" \
            '{schema_version:"push-result.v1", pushed:false, lgtm:$lgtm, status:$status, terminal_reason:$terminal_reason, reason:$terminal_reason, head_sha:$head_sha, updated_head_sha:$updated_head_sha}' \
            > codex-review-artifacts/terminal-memory/terminal-output.json

          if ! codex-review reentry record-reentry \
            --in codex-review-artifacts/terminal-memory/terminal-output.json \
            --loop-state "${LOOP_STATE_PATH}" \
            --pr-context "${COMMON_ARTIFACT_DIR}/pr-context.json" \
            --repo-path "${REPO_PATH}" \
            --token "${loop_pat}" \
            --out codex-review-artifacts/terminal-memory/reentry-loop-state.json; then
            echo "terminal memory record-reentry failed nonfatally" >> "${GITHUB_STEP_SUMMARY}"
          fi

  finalize:
    name: Finalize Loop
    needs: [validate, setup-state, classify, run-stage]
    if: ${{ always() }}
    runs-on:
      group: "Home Server Runners"
      labels: dongwontuna-labs-runner
    permissions:
      contents: write
      pull-requests: write
      actions: read
    outputs:
      lgtm: ${{ steps.final_outputs.outputs.lgtm }}
      should_redispatch: ${{ steps.final_outputs.outputs.should_redispatch }}
      terminal_reason: ${{ steps.final_outputs.outputs.terminal_reason }}
      updated_head_sha: ${{ steps.final_outputs.outputs.updated_head_sha }}
    steps:
      - name: Resolve final loop candidate
        id: resolve
        shell: bash
        env:
          VALIDATE_RESULT: ${{ needs.validate.result }}
          VALIDATE_REASON: ${{ needs.validate.outputs.terminal_reason }}
          SETUP_RESULT: ${{ needs.setup-state.result }}
          CLASSIFY_RESULT: ${{ needs.classify.result }}
          CLASSIFY_MEMORY_ONLY: ${{ needs.classify.outputs.memory_only }}
          CLASSIFY_SHOULD_RUN_MODEL: ${{ needs.classify.outputs.should_run_model }}
          CLASSIFY_REASON: ${{ needs.classify.outputs.classification_reason }}
          CLASSIFY_CODEX_MEMORY_MARKER: ${{ needs.classify.outputs.codex_memory_marker }}
          CLASSIFY_ACTOR_GUARD: ${{ needs.classify.outputs.actor_guard }}
          RUN_STAGE_RESULT: ${{ needs.run-stage.result }}
          RUN_STAGE_LGTM: ${{ needs.run-stage.outputs.lgtm }}
          RUN_STAGE_REDISPATCH: ${{ needs.run-stage.outputs.should_redispatch }}
          RUN_STAGE_REASON: ${{ needs.run-stage.outputs.terminal_reason }}
          RUN_STAGE_UPDATED_HEAD_SHA: ${{ needs.run-stage.outputs.updated_head_sha }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          INPUT_BASE_REF: ${{ inputs.base_ref }}
          INPUT_ITERATION: ${{ inputs.iteration }}
          INPUT_CORRELATION_ID: ${{ inputs.correlation_id }}
          INPUT_REQUESTED_BY: ${{ inputs.requested_by }}
        run: |
          set -euo pipefail

          lgtm="${RUN_STAGE_LGTM:-false}"
          should_redispatch="${RUN_STAGE_REDISPATCH:-false}"
          terminal_reason="${RUN_STAGE_REASON:-}"
          updated_head_sha="${RUN_STAGE_UPDATED_HEAD_SHA:-}"
          dispatch_candidate="false"
          next_iteration="$(( INPUT_ITERATION + 1 ))"
          next_head_sha="${INPUT_HEAD_SHA}"

          if [[ "${VALIDATE_RESULT}" != "success" ]]; then
            terminal_reason="${VALIDATE_REASON:-validation-failed}"
            lgtm="false"
            should_redispatch="false"
            updated_head_sha=""
          elif [[ "${SETUP_RESULT}" != "success" ]]; then
            terminal_reason="state-setup-failed"
            lgtm="false"
            should_redispatch="false"
            updated_head_sha=""
          elif [[ "${CLASSIFY_RESULT}" != "success" ]]; then
            terminal_reason="classify-failed"
            lgtm="false"
            should_redispatch="false"
            updated_head_sha=""
          elif [[ "${CLASSIFY_MEMORY_ONLY}" == "true" && "${CLASSIFY_SHOULD_RUN_MODEL}" == "false" && "${CLASSIFY_CODEX_MEMORY_MARKER}" == "true" && "${CLASSIFY_ACTOR_GUARD}" == "true" ]]; then
            terminal_reason="memory_only_noop"
            lgtm="false"
            should_redispatch="false"
            updated_head_sha=""
          elif [[ "${RUN_STAGE_RESULT}" != "success" ]]; then
            terminal_reason="${RUN_STAGE_REASON:-stage-failed}"
            lgtm="false"
            should_redispatch="false"
            updated_head_sha=""
          fi

          # A continuation only happens after a remote-verified push: the next
          # iteration re-reviews the new head SHA. lgtm/terminal => no dispatch.
          if [[ "${should_redispatch}" == "true" ]]; then
            if [[ -z "${updated_head_sha}" ]]; then
              terminal_reason="missing-updated-head-sha"
              should_redispatch="false"
            else
              next_head_sha="${updated_head_sha}"
              dispatch_candidate="true"
            fi
          fi

          # repository_dispatch client_payload carries only the next iteration's
          # entry inputs. No stage/state pointers: the next run executes the full
          # sequential review->design->fix->push chain from a fresh state.
          jq -n \
            --arg pr_number "${INPUT_PR_NUMBER}" \
            --arg head_sha "${next_head_sha}" \
            --arg base_ref "${INPUT_BASE_REF}" \
            --arg iteration "${next_iteration}" \
            --arg correlation_id "${INPUT_CORRELATION_ID}" \
            --arg requested_by "${INPUT_REQUESTED_BY}" \
            '{pr_number:($pr_number|tonumber), head_sha:$head_sha, base_ref:$base_ref, iteration:($iteration|tonumber), correlation_id:$correlation_id, requested_by:$requested_by}' \
            > .codex-loop-dispatch-payload.json

          jq -n --arg event_type "codex-loop" --slurpfile client_payload .codex-loop-dispatch-payload.json \
            '{event_type:$event_type, client_payload:$client_payload[0]}' \
            > .codex-loop-repository-dispatch.json

          {
            echo "lgtm=${lgtm}"
            echo "should_redispatch=${should_redispatch}"
            echo "terminal_reason=${terminal_reason}"
            echo "updated_head_sha=${updated_head_sha}"
            echo "dispatch_candidate=${dispatch_candidate}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Codex loop finalize candidate"
            echo "lgtm=${lgtm}"
            echo "should_redispatch=${should_redispatch}"
            echo "terminal_reason=${terminal_reason}"
            echo "updated_head_sha=${updated_head_sha}"
            echo "dispatch_candidate=${dispatch_candidate}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Dispatch live continuation repository_dispatch
        id: dispatch_continuation
        if: ${{ steps.resolve.outputs.dispatch_candidate == 'true' }}
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          : "${CODEX_LOOP_PAT:?CODEX_LOOP_PAT not set on runner}"
          export GH_TOKEN="${CODEX_LOOP_PAT}"
          gh api --method POST "repos/${REPOSITORY}/dispatches" --input .codex-loop-repository-dispatch.json
          echo "dispatched=true" >> "${GITHUB_OUTPUT}"

      - name: Emit final loop outputs
        id: final_outputs
        if: ${{ always() }}
        shell: bash
        env:
          RESOLVE_LGTM: ${{ steps.resolve.outputs.lgtm }}
          RESOLVE_REDISPATCH: ${{ steps.resolve.outputs.should_redispatch }}
          RESOLVE_TERMINAL_REASON: ${{ steps.resolve.outputs.terminal_reason }}
          RESOLVE_UPDATED_HEAD_SHA: ${{ steps.resolve.outputs.updated_head_sha }}
          DISPATCH_CANDIDATE: ${{ steps.resolve.outputs.dispatch_candidate }}
          DISPATCHED: ${{ steps.dispatch_continuation.outputs.dispatched }}
        run: |
          set -euo pipefail
          lgtm="${RESOLVE_LGTM:-false}"
          should_redispatch="${RESOLVE_REDISPATCH:-false}"
          terminal_reason="${RESOLVE_TERMINAL_REASON:-}"
          updated_head_sha="${RESOLVE_UPDATED_HEAD_SHA:-}"

          if [[ "${DISPATCH_CANDIDATE}" == "true" && "${DISPATCHED}" != "true" ]]; then
            should_redispatch="false"
            terminal_reason="dispatch-not-emitted"
          fi

          {
            echo "lgtm=${lgtm}"
            echo "should_redispatch=${should_redispatch}"
            echo "terminal_reason=${terminal_reason}"
            echo "updated_head_sha=${updated_head_sha}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Codex loop finalize"
            echo "lgtm=${lgtm}"
            echo "should_redispatch=${should_redispatch}"
            echo "terminal_reason=${terminal_reason}"
            echo "updated_head_sha=${updated_head_sha}"
          } >> "${GITHUB_STEP_SUMMARY}"

  required-checks:
    name: Required Checks
    needs: [validate, setup-state, classify, run-stage, finalize]
    if: ${{ !cancelled() }}
    runs-on:
      group: "Home Server Runners"
      labels: dongwontuna-labs-runner
    permissions: {}
    steps:
      - name: Verify required job results
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          echo "${NEEDS_JSON}" | jq .
          if jq -e '[.[] | select(.result == "failure" or .result == "cancelled")] | length > 0' <<< "${NEEDS_JSON}" >/dev/null; then
            jq -r 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | "\(.key)=\(.value.result)"' <<< "${NEEDS_JSON}"
            exit 1
          fi

          echo "all required jobs succeeded or skipped"
