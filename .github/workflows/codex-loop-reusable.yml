name: Codex Loop Reusable Core

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to process.
        type: number
        required: true
      head_sha:
        description: Expected pull request head SHA.
        type: string
        required: true
      base_ref:
        description: Expected pull request base ref.
        type: string
        required: true
      stage:
        description: Loop stage; must be review, design, fix, or push.
        type: string
        required: true
      iteration:
        description: Zero-based loop iteration.
        type: number
        required: true
      correlation_id:
        description: Stable loop correlation id.
        type: string
        required: true
      requested_by:
        description: GitHub actor or app slug that requested this step.
        type: string
        required: true
      state_run_id:
        description: Exact upstream workflow run id that owns the prior loop-state artifact.
        type: string
        required: false
      state_artifact_name:
        description: Exact prior loop-state artifact name to download from state_run_id.
        type: string
        required: false
    secrets:
      CODEX_RELAY_API_KEY:
        description: Static relay API key used to authenticate model (codex-action) calls.
        required: true
      CODEX_LOOP_PAT:
        description: Permanent PAT used for push and continuation repository_dispatch.
        required: true
    outputs:
      next_stage:
        description: Next loop stage requested by the core.
        value: ${{ jobs.finalize.outputs.next_stage }}
      lgtm:
        description: Whether the current run reached an LGTM terminal state.
        value: ${{ jobs.finalize.outputs.lgtm }}
      should_redispatch:
        description: Whether a trusted caller should continue the loop.
        value: ${{ jobs.finalize.outputs.should_redispatch }}
      terminal_reason:
        description: Empty for non-terminal continuation, otherwise the terminal reason.
        value: ${{ jobs.finalize.outputs.terminal_reason }}
      state_run_id:
        description: Workflow run id that owns the selected final state artifact.
        value: ${{ jobs.finalize.outputs.state_run_id }}
      state_artifact_name:
        description: Selected final state artifact name for the caller to pass into the next stage.
        value: ${{ jobs.finalize.outputs.state_artifact_name }}
      updated_head_sha:
        description: Remote-verified PR head SHA after a successful push; empty otherwise.
        value: ${{ jobs.finalize.outputs.updated_head_sha }}

permissions: {}

concurrency:
  group: codex-loop-${{ inputs.correlation_id }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Inputs
    runs-on:
      group: "Home Server Runners"
      labels: dongwontuna-labs-runner
    permissions:
      contents: read
      pull-requests: read
    outputs:
      valid: ${{ steps.validate_payload.outputs.valid }}
      terminal_reason: ${{ steps.validate_payload.outputs.terminal_reason }}
      stage: ${{ steps.validate_payload.outputs.stage }}
      iteration: ${{ steps.validate_payload.outputs.iteration }}
    steps:
      - name: Validate payload schema
        id: validate_payload
        shell: bash
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          INPUT_BASE_REF: ${{ inputs.base_ref }}
          INPUT_STAGE: ${{ inputs.stage }}
          INPUT_ITERATION: ${{ inputs.iteration }}
          INPUT_CORRELATION_ID: ${{ inputs.correlation_id }}
          INPUT_REQUESTED_BY: ${{ inputs.requested_by }}
          INPUT_STATE_RUN_ID: ${{ inputs.state_run_id }}
          INPUT_STATE_ARTIFACT_NAME: ${{ inputs.state_artifact_name }}
        run: |
          set -euo pipefail

          terminal_reason=""
          valid="true"

          require_non_empty() {
            local name="$1"
            local value="$2"
            if [[ -z "${value}" ]]; then
              terminal_reason="missing-${name}"
              valid="false"
            fi
          }

          require_non_empty pr_number "${INPUT_PR_NUMBER}"
          require_non_empty head_sha "${INPUT_HEAD_SHA}"
          require_non_empty base_ref "${INPUT_BASE_REF}"
          require_non_empty stage "${INPUT_STAGE}"
          require_non_empty iteration "${INPUT_ITERATION}"
          require_non_empty correlation_id "${INPUT_CORRELATION_ID}"
          require_non_empty requested_by "${INPUT_REQUESTED_BY}"

          if [[ "${valid}" == "true" ]]; then
            case "${INPUT_STAGE}" in
              review|design|fix|push) ;;
              *)
                terminal_reason="invalid-stage"
                valid="false"
                ;;
            esac
          fi

          if [[ "${valid}" == "true" ]]; then
            if ! [[ "${INPUT_ITERATION}" =~ ^[0-9]+$ ]]; then
              terminal_reason="invalid-iteration"
              valid="false"
            fi
          fi

          if [[ "${valid}" == "true" ]]; then
            if [[ -n "${INPUT_STATE_RUN_ID}" || -n "${INPUT_STATE_ARTIFACT_NAME}" ]]; then
              if [[ -z "${INPUT_STATE_RUN_ID}" || -z "${INPUT_STATE_ARTIFACT_NAME}" ]]; then
                terminal_reason="invalid-state-artifact"
                valid="false"
              elif ! [[ "${INPUT_STATE_RUN_ID}" =~ ^[0-9]+$ ]] || (( INPUT_STATE_RUN_ID <= 0 )); then
                terminal_reason="invalid-state-run-id"
                valid="false"
              elif [[ "${INPUT_STATE_ARTIFACT_NAME}" == */* || "${INPUT_STATE_ARTIFACT_NAME}" == "." || "${INPUT_STATE_ARTIFACT_NAME}" == ".." ]]; then
                terminal_reason="invalid-state-artifact-name"
                valid="false"
              fi
            fi
          fi

          {
            echo "valid=${valid}"
            echo "terminal_reason=${terminal_reason}"
            echo "stage=${INPUT_STAGE}"
            echo "iteration=${INPUT_ITERATION}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Codex loop validation"
            echo "payload schema: workflow_call typed inputs"
            echo "stage=${INPUT_STAGE}"
            echo "iteration=${INPUT_ITERATION}"
            echo "state_run_id=${INPUT_STATE_RUN_ID}"
            echo "state_artifact_name=${INPUT_STATE_ARTIFACT_NAME}"
            echo "valid=${valid}"
            if [[ -n "${terminal_reason}" ]]; then
              echo "terminal_reason=${terminal_reason}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${valid}" != "true" ]]; then
            exit 1
          fi

  setup-state:
    name: Setup Codex State
    needs: [validate]
    if: ${{ needs.validate.outputs.valid == 'true' }}
    runs-on:
      group: "Home Server Runners"
      labels: dongwontuna-labs-runner
    permissions:
      contents: read
      pull-requests: read
      actions: read
    outputs:
      state_artifact_name: ${{ steps.state.outputs.state_artifact_name }}
    steps:
      - name: Checkout target base reference
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.base_ref }}
          path: target-base
          persist-credentials: false

      - name: Checkout PR head data
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.head_sha }}
          path: pr-head
          persist-credentials: false

      - name: Setup trusted codex-review helper
        id: setup_codex
        uses: DongwonTTuna-Labs/home-server-infra/.github/actions/setup-codex-review@3b9e9f480630c4c51a6978f963e741fab9940894

      - name: Download prior loop state artifact
        if: ${{ inputs.state_run_id != '' && inputs.state_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.state_artifact_name }}
          run-id: ${{ inputs.state_run_id }}
          path: codex-review-artifacts/prior-state

      - name: Read or bootstrap loop state artifact
        id: state
        shell: bash
        env:
          INPUT_CORRELATION_ID: ${{ inputs.correlation_id }}
          INPUT_ITERATION: ${{ inputs.iteration }}
          INPUT_STATE_ARTIFACT_NAME: ${{ inputs.state_artifact_name }}
        run: |
          set -euo pipefail
          mkdir -p codex-review-artifacts/prior-state

          if [[ -n "${INPUT_STATE_ARTIFACT_NAME}" ]]; then
            codex-review loop read-state               --loop-state "codex-review-artifacts/prior-state/${INPUT_STATE_ARTIFACT_NAME}"               --out codex-loop-state.json
          else
            codex-review loop read-state               --out codex-loop-state.json
          fi

          artifact_name="codex-loop-state-${INPUT_CORRELATION_ID}-${INPUT_ITERATION}.json"
          echo "state_artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload current loop state artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.state.outputs.state_artifact_name }}
          path: codex-loop-state.json
          retention-days: 7

  run-stage:
    name: Run Stage
    needs: [validate, setup-state]
    if: ${{ always() && needs.validate.outputs.valid == 'true' && needs.setup-state.result == 'success' }}
    runs-on:
      group: "Home Server Runners"
      labels: dongwontuna-labs-runner
    permissions:
      contents: read
      pull-requests: read
      actions: read
    outputs:
      next_stage: ${{ steps.stage_outputs.outputs.next_stage }}
      lgtm: ${{ steps.stage_outputs.outputs.lgtm }}
      should_redispatch: ${{ steps.stage_outputs.outputs.should_redispatch }}
      terminal_reason: ${{ steps.stage_outputs.outputs.terminal_reason }}
      updated_head_sha: ${{ steps.stage_outputs.outputs.updated_head_sha }}
      state_artifact_name: ${{ steps.stage_outputs.outputs.state_artifact_name }}
    steps:
      - name: Checkout PR head data
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.head_sha }}
          path: pr-head
          persist-credentials: false

      - name: Setup trusted codex-review helper
        id: setup_codex
        uses: DongwonTTuna-Labs/home-server-infra/.github/actions/setup-codex-review@3b9e9f480630c4c51a6978f963e741fab9940894

      - name: Download setup loop state artifact
        uses: actions/download-artifact@v4
        with:
          name: codex-loop-state-${{ inputs.correlation_id }}-${{ inputs.iteration }}.json
          path: .

      - name: Download prior stage state artifact
        if: ${{ inputs.state_run_id != '' && inputs.state_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.state_artifact_name }}
          run-id: ${{ inputs.state_run_id }}
          path: codex-review-artifacts/prior-state

      - name: Prepare active stage helper inputs
        id: prepare_stage
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_STAGE: ${{ inputs.stage }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          INPUT_BASE_REF: ${{ inputs.base_ref }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_CORRELATION_ID: ${{ inputs.correlation_id }}
          INPUT_ITERATION: ${{ inputs.iteration }}
          INPUT_STATE_ARTIFACT_NAME: ${{ inputs.state_artifact_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          mkdir -p codex-review-artifacts/common codex-review-artifacts/stage-state
          # Always-live: the loop always runs live model work using the static
          # relay key; there is no relay probe to gate this on.
          live_enabled="true"

          jq -n \
            --arg repository "${REPOSITORY}" \
            --arg head_sha "${INPUT_HEAD_SHA}" \
            --arg current_head_sha "${INPUT_HEAD_SHA}" \
            --arg base_ref "${INPUT_BASE_REF}" \
            --argjson pr_number "${INPUT_PR_NUMBER}" \
            '{repository:$repository, pr_number:$pr_number, head_sha:$head_sha, current_head_sha:$current_head_sha, base_ref:$base_ref}' \
            > codex-review-artifacts/common/pr-seed.json

          if [[ "${live_enabled}" != "true" ]]; then
            cp codex-review-artifacts/common/pr-seed.json codex-review-artifacts/common/pr-context.json
            jq -n '{schema_version:"changed-lines.v1", changed_line_map:{}}' > codex-review-artifacts/common/changed-lines.json
            printf '' > codex-review-artifacts/common/docs-context.md
            jq -n '{present:false, decision:"skipped", source_summary:[]}' > codex-review-artifacts/common/openspec-context.json
          else
            codex-review context pr \
              --pr-context codex-review-artifacts/common/pr-seed.json \
              --repo-path pr-head \
              --token "${GH_TOKEN}" \
              --out codex-review-artifacts/common/pr-context.json
            codex-review context changed-lines \
              --pr-context codex-review-artifacts/common/pr-context.json \
              --out codex-review-artifacts/common/changed-lines.json
            codex-review context docs \
              --repo-path pr-head \
              --out codex-review-artifacts/common/docs-context.md
            codex-review context openspec \
              --pr-context codex-review-artifacts/common/pr-context.json \
              --repo-path pr-head \
              --token "${GH_TOKEN}" \
              --out codex-review-artifacts/common/openspec-context.json
          fi

          case "${INPUT_STAGE}" in
            review)
              mkdir -p codex-review-artifacts/review/correctness codex-review-artifacts/review-state-bundle
              codex-review review build-review-prompt \
                --axis correctness \
                --pr-context codex-review-artifacts/common/pr-context.json \
                --docs-context codex-review-artifacts/common/docs-context.md \
                --out codex-review-artifacts/review/correctness/prompt.md
              if [[ "${live_enabled}" == "true" ]]; then
                echo "needs_review_axis_model=true" >> "${GITHUB_OUTPUT}"
              else
                codex-review review default-result \
                  --axis correctness \
                  --out codex-review-artifacts/review/correctness/findings.raw.json
                echo "needs_review_axis_model=false" >> "${GITHUB_OUTPUT}"
              fi
              ;;
            design)
              mkdir -p codex-review-artifacts/design codex-review-artifacts/design-state-bundle
              codex-review loop verify-bundle \
                --kind review \
                --name "${INPUT_STATE_ARTIFACT_NAME}" \
                --dir codex-review-artifacts/prior-state \
                --out codex-review-artifacts/design/review-state-verify.json
              bundle_ok="$(jq -er '.ok | tostring' codex-review-artifacts/design/review-state-verify.json)"
              if [[ "${bundle_ok}" != "true" ]]; then
                terminal_reason="$(jq -r '.terminal_reason // "artifact_missing"' codex-review-artifacts/design/review-state-verify.json)"
                cp codex-review-artifacts/design/review-state-verify.json codex-review-artifacts/design-state-bundle/review-state-verify.json
                jq -n '{schema_version:"dispatch-ledger.v1", entries:[]}' > codex-review-artifacts/design-state-bundle/dispatch-ledger.json
                jq -n \
                  --arg next_stage "" \
                  --arg terminal_reason "${terminal_reason}" \
                  --arg updated_head_sha "" \
                  --argjson lgtm false \
                  --argjson should_redispatch false \
                  '{next_stage:$next_stage, lgtm:$lgtm, should_redispatch:$should_redispatch, terminal_reason:$terminal_reason, updated_head_sha:$updated_head_sha}' \
                  > .codex-loop-stage-result.json
                echo "needs_design_inventory_model=false" >> "${GITHUB_OUTPUT}"
                exit 0
              fi
              cp codex-review-artifacts/prior-state/dispatch-ledger.json codex-review-artifacts/design-state-bundle/dispatch-ledger.json
              codex-review design context \
                --in codex-review-artifacts/prior-state/techlead-decision.json \
                --pr-context codex-review-artifacts/common/pr-context.json \
                --review-context codex-review-artifacts/common/docs-context.md \
                --docs-context codex-review-artifacts/common/docs-context.md \
                --openspec-context codex-review-artifacts/common/openspec-context.json \
                --out codex-review-artifacts/design/design-context.json
              codex-review design build-inventory-prompt \
                --in codex-review-artifacts/design/design-context.json \
                --out codex-review-artifacts/design/design-inventory.prompt.md
              if [[ "${live_enabled}" == "true" ]]; then
                echo "needs_design_inventory_model=true" >> "${GITHUB_OUTPUT}"
              else
                codex-review design default-inventory \
                  --in codex-review-artifacts/design/design-context.json \
                  --out codex-review-artifacts/design/design-inventory.raw.json
                echo "needs_design_inventory_model=false" >> "${GITHUB_OUTPUT}"
              fi
              ;;
            fix)
              mkdir -p codex-review-artifacts/fix_dispatch codex-review-artifacts/fix-context codex-review-artifacts/fix-state-bundle
              codex-review loop verify-bundle \
                --kind design \
                --name "${INPUT_STATE_ARTIFACT_NAME}" \
                --dir codex-review-artifacts/prior-state \
                --out codex-review-artifacts/fix_dispatch/design-state-verify.json
              bundle_ok="$(jq -er '.ok | tostring' codex-review-artifacts/fix_dispatch/design-state-verify.json)"
              if [[ "${bundle_ok}" != "true" ]]; then
                terminal_reason="$(jq -r '.terminal_reason // "artifact_missing"' codex-review-artifacts/fix_dispatch/design-state-verify.json)"
                cp codex-review-artifacts/fix_dispatch/design-state-verify.json codex-review-artifacts/fix-state-bundle/design-state-verify.json
                jq -n '{schema_version:"dispatch-ledger.v1", entries:[]}' > codex-review-artifacts/fix-state-bundle/dispatch-ledger.json
                jq -n \
                  --arg next_stage "" \
                  --arg terminal_reason "${terminal_reason}" \
                  --arg updated_head_sha "" \
                  --argjson lgtm false \
                  --argjson should_redispatch false \
                  '{next_stage:$next_stage, lgtm:$lgtm, should_redispatch:$should_redispatch, terminal_reason:$terminal_reason, updated_head_sha:$updated_head_sha}' \
                  > .codex-loop-stage-result.json
                echo "needs_fix_agent_model=false" >> "${GITHUB_OUTPUT}"
                exit 0
              fi
              cp codex-review-artifacts/prior-state/dispatch-ledger.json codex-review-artifacts/fix-state-bundle/dispatch-ledger.json
              cp codex-review-artifacts/common/pr-context.json codex-review-artifacts/fix-context/pr-context.json
              cp codex-review-artifacts/common/docs-context.md codex-review-artifacts/fix-context/docs-context.md
              codex-review fix_dispatch plan \
                --in codex-review-artifacts/prior-state/design-plan.json \
                --chief-decision codex-review-artifacts/prior-state/chief-decision.json \
                --out codex-review-artifacts/fix_dispatch/manifest.json
              codex-review fix_dispatch prepare-agents \
                --inventory codex-review-artifacts/fix_dispatch/manifest.json \
                --design-plan codex-review-artifacts/prior-state/design-plan.json \
                --chief-decision codex-review-artifacts/prior-state/chief-decision.json \
                --docs-context codex-review-artifacts/fix-context/docs-context.md \
                --repo-path pr-head \
                --work-dir codex-review-artifacts/fix_dispatch/agents \
                --out codex-review-artifacts/fix_dispatch/agent-matrix.json
              has_agent_tasks="$(jq -er 'if (.include | length) > 0 then "true" else "false" end' codex-review-artifacts/fix_dispatch/agent-matrix.json)"
              if [[ "${has_agent_tasks}" == "true" && "${live_enabled}" == "true" ]]; then
                echo "needs_fix_agent_model=true" >> "${GITHUB_OUTPUT}"
              else
                echo "needs_fix_agent_model=false" >> "${GITHUB_OUTPUT}"
                while IFS= read -r task_file; do
                  task_dir="$(dirname "${task_file}")"
                  codex-review fix_dispatch default-agent-result \
                    --inventory "${task_file}" \
                    --out "${task_dir}/result.json"
                  codex-review fix_dispatch validate-agent-result \
                    --inventory "${task_file}" \
                    --in "${task_dir}/result.json" \
                    --repo-path pr-head \
                    --out "${task_dir}/result.validated.json"
                done < <(find codex-review-artifacts/fix_dispatch/agents -name task.json -print | sort)
              fi
              ;;
            push)
              mkdir -p codex-review-artifacts/push codex-review-artifacts/push-state-bundle
              codex-review loop verify-bundle \
                --kind fix \
                --name "${INPUT_STATE_ARTIFACT_NAME}" \
                --dir codex-review-artifacts/prior-state \
                --out codex-review-artifacts/push/fix-state-verify.json
              bundle_ok="$(jq -er '.ok | tostring' codex-review-artifacts/push/fix-state-verify.json)"
              cp codex-review-artifacts/push/fix-state-verify.json codex-review-artifacts/push-state-bundle/fix-state-verify.json
              if [[ "${bundle_ok}" != "true" ]]; then
                terminal_reason="$(jq -r '.terminal_reason // "artifact_missing"' codex-review-artifacts/push/fix-state-verify.json)"
                jq -n \
                  --arg next_stage "" \
                  --arg terminal_reason "${terminal_reason}" \
                  --arg updated_head_sha "" \
                  --argjson lgtm false \
                  --argjson should_redispatch false \
                  '{next_stage:$next_stage, lgtm:$lgtm, should_redispatch:$should_redispatch, terminal_reason:$terminal_reason, updated_head_sha:$updated_head_sha}' \
                  > .codex-loop-stage-result.json
                echo "needs_push_commit=false" >> "${GITHUB_OUTPUT}"
                exit 0
              fi
              cp codex-review-artifacts/prior-state/dispatch-ledger.json codex-review-artifacts/push-state-bundle/dispatch-ledger.json
              cp codex-review-artifacts/prior-state/merged-fix.json codex-review-artifacts/push-state-bundle/merged-fix.json
              cp codex-review-artifacts/prior-state/validated-fix.json codex-review-artifacts/push-state-bundle/validated-fix.json
              cp codex-review-artifacts/prior-state/semantic-safety.json codex-review-artifacts/push-state-bundle/semantic-safety.json
              validation_ready="$(jq -er '(.validated == true and (.loop_budget_ok // true) == true) | tostring' codex-review-artifacts/prior-state/validated-fix.json)"
              if [[ "${validation_ready}" != "true" ]]; then
                validation_status="$(jq -r '.status // "validation_failed"' codex-review-artifacts/prior-state/validated-fix.json)"
                jq -n \
                  --arg next_stage "" \
                  --arg terminal_reason "${validation_status}" \
                  --arg updated_head_sha "" \
                  --argjson lgtm false \
                  --argjson should_redispatch false \
                  '{next_stage:$next_stage, lgtm:$lgtm, should_redispatch:$should_redispatch, terminal_reason:$terminal_reason, updated_head_sha:$updated_head_sha}' \
                  > .codex-loop-stage-result.json
                echo "needs_push_commit=false" >> "${GITHUB_OUTPUT}"
              else
                echo "needs_push_commit=true" >> "${GITHUB_OUTPUT}"
              fi
              ;;
          esac

          {
            echo "## Codex loop stage prepare"
            echo "stage=${INPUT_STAGE}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Run live Codex review findings
        if: ${{ inputs.stage == 'review' && steps.prepare_stage.outputs.needs_review_axis_model == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_RELAY_API_KEY }}
          responses-api-endpoint: https://relay-ai.dongwontuna.net/v1/responses
          prompt: |
            Read `codex-review-artifacts/review/correctness/prompt.md` and inspect the checked-out PR head at `pr-head`.
            Write only schema-valid JSON for `review-axis-findings.v1` to `codex-review-artifacts/review/correctness/findings.raw.json`.
            Do not post comments, push commits, access secrets, or modify files outside `codex-review-artifacts/review/correctness/findings.raw.json`.

      - name: Prepare review techlead decision
        id: review_techlead_prepare
        if: ${{ inputs.stage == 'review' }}
        shell: bash
        env:
          RELAY_CONFIGURED: "true"
        run: |
          set -euo pipefail
          if [[ ! -s .codex-loop-stage-result.json ]]; then
            test -s codex-review-artifacts/review/correctness/findings.raw.json
            codex-review review validate \
              --axis correctness \
              --in codex-review-artifacts/review/correctness/findings.raw.json \
              --pr-context codex-review-artifacts/common/pr-context.json \
              --changed-lines codex-review-artifacts/common/changed-lines.json \
              --repo-path pr-head \
              --out codex-review-artifacts/review/correctness/findings.validated.json
            codex-review review combine \
              --artifacts codex-review-artifacts/review \
              --out codex-review-artifacts/review/combined-findings.json
            codex-review techlead build-techlead-prompt \
              --in codex-review-artifacts/review/combined-findings.json \
              --pr-context codex-review-artifacts/common/pr-context.json \
              --docs-context codex-review-artifacts/common/docs-context.md \
              --out codex-review-artifacts/review/techlead.prompt.md
            if [[ "${RELAY_CONFIGURED}" == "true" ]]; then
              echo "needs_review_techlead_model=true" >> "${GITHUB_OUTPUT}"
            else
              codex-review techlead default-result \
                --in codex-review-artifacts/review/combined-findings.json \
                --out codex-review-artifacts/review/techlead-decision.raw.json
              echo "needs_review_techlead_model=false" >> "${GITHUB_OUTPUT}"
            fi
          fi

      - name: Run live Codex review techlead
        if: ${{ inputs.stage == 'review' && steps.review_techlead_prepare.outputs.needs_review_techlead_model == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_RELAY_API_KEY }}
          responses-api-endpoint: https://relay-ai.dongwontuna.net/v1/responses
          prompt: |
            Read `codex-review-artifacts/review/techlead.prompt.md` and inspect `pr-head` as needed.
            Write only schema-valid JSON for `techlead-decision.v1` to `codex-review-artifacts/review/techlead-decision.raw.json`.
            Do not post comments, push commits, access secrets, or modify files outside `codex-review-artifacts/review/techlead-decision.raw.json`.

      - name: Complete review stage state
        if: ${{ inputs.stage == 'review' }}
        shell: bash
        env:
          INPUT_CORRELATION_ID: ${{ inputs.correlation_id }}
          INPUT_ITERATION: ${{ inputs.iteration }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [[ ! -s .codex-loop-stage-result.json ]]; then
            test -s codex-review-artifacts/review/techlead-decision.raw.json
            codex-review techlead validate \
              --in codex-review-artifacts/review/techlead-decision.raw.json \
              --artifacts codex-review-artifacts/review/combined-findings.json \
              --repo-path pr-head \
              --out codex-review-artifacts/review-state-bundle/techlead-decision.json
            codex-review techlead classify \
              --in codex-review-artifacts/review-state-bundle/techlead-decision.json \
              --artifacts codex-review-artifacts/review/combined-findings.json \
              --out codex-review-artifacts/review-state-bundle/review-publication.json
            codex-review techlead publish --dry-run \
              --in codex-review-artifacts/review-state-bundle/review-publication.json \
              --pr-context codex-review-artifacts/common/pr-context.json \
              --changed-lines codex-review-artifacts/common/changed-lines.json \
              --out codex-review-artifacts/review-state-bundle/publish-report.json
            codex-review loop route-after-techlead \
              --in codex-review-artifacts/review-state-bundle/techlead-decision.json \
              --out codex-review-artifacts/review-state-bundle/route.json
            route="$(jq -er '.route' codex-review-artifacts/review-state-bundle/route.json)"
            case "${route}" in
              run_design)
                next_stage="design"; lgtm="false"; should_redispatch="true"; terminal_reason="" ;;
              stop_lgtm)
                next_stage=""; lgtm="true"; should_redispatch="false"; terminal_reason="" ;;
              stop_after_publish)
                next_stage=""; lgtm="false"; should_redispatch="false"; terminal_reason="review_findings_published" ;;
              stop_needs_human)
                next_stage=""; lgtm="false"; should_redispatch="false"; terminal_reason="review_needs_human" ;;
              *)
                next_stage=""; lgtm="false"; should_redispatch="false"; terminal_reason="model_output_invalid" ;;
            esac
            cp codex-review-artifacts/review/combined-findings.json codex-review-artifacts/review-state-bundle/combined-findings.json
            jq -n '{schema_version:"dispatch-ledger.v1", entries:[]}' > codex-review-artifacts/review-state-bundle/dispatch-ledger.json
            jq -n \
              --arg next_stage "${next_stage}" \
              --arg terminal_reason "${terminal_reason}" \
              --arg updated_head_sha "" \
              --argjson lgtm "${lgtm}" \
              --argjson should_redispatch "${should_redispatch}" \
              '{next_stage:$next_stage, lgtm:$lgtm, should_redispatch:$should_redispatch, terminal_reason:$terminal_reason, updated_head_sha:$updated_head_sha}' \
              > .codex-loop-stage-result.json
          fi

      - name: Run live Codex design inventory
        if: ${{ inputs.stage == 'design' && steps.prepare_stage.outputs.needs_design_inventory_model == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_RELAY_API_KEY }}
          responses-api-endpoint: https://relay-ai.dongwontuna.net/v1/responses
          prompt: |
            Read `codex-review-artifacts/design/design-inventory.prompt.md` and inspect `pr-head` as needed.
            Write only schema-valid JSON for `design-inventory.v1` to `codex-review-artifacts/design/design-inventory.raw.json`.
            Do not post comments, push commits, access secrets, or modify files outside `codex-review-artifacts/design/design-inventory.raw.json`.

      - name: Prepare design clusters prompt
        id: design_clusters_prepare
        if: ${{ inputs.stage == 'design' }}
        shell: bash
        env:
          RELAY_CONFIGURED: "true"
        run: |
          set -euo pipefail
          if [[ ! -s .codex-loop-stage-result.json ]]; then
            test -s codex-review-artifacts/design/design-inventory.raw.json
            codex-review design normalize \
              --in codex-review-artifacts/design/design-inventory.raw.json \
              --pr-context codex-review-artifacts/design/design-context.json \
              --repo-path pr-head \
              --out codex-review-artifacts/design/design-inventory.json
            codex-review design build-clusters-prompt \
              --inventory codex-review-artifacts/design/design-inventory.json \
              --pr-context codex-review-artifacts/design/design-context.json \
              --out codex-review-artifacts/design/design-clusters.prompt.md
            if [[ "${RELAY_CONFIGURED}" == "true" ]]; then
              echo "needs_design_clusters_model=true" >> "${GITHUB_OUTPUT}"
            else
              codex-review design default-clusters \
                --inventory codex-review-artifacts/design/design-inventory.json \
                --out codex-review-artifacts/design/design-clusters.raw.json
              echo "needs_design_clusters_model=false" >> "${GITHUB_OUTPUT}"
            fi
          fi

      - name: Run live Codex design clusters
        if: ${{ inputs.stage == 'design' && steps.design_clusters_prepare.outputs.needs_design_clusters_model == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_RELAY_API_KEY }}
          responses-api-endpoint: https://relay-ai.dongwontuna.net/v1/responses
          prompt: |
            Read `codex-review-artifacts/design/design-clusters.prompt.md` and inspect `pr-head` as needed.
            Write only schema-valid JSON for `design-clusters.v1` to `codex-review-artifacts/design/design-clusters.raw.json`.
            Do not post comments, push commits, access secrets, or modify files outside `codex-review-artifacts/design/design-clusters.raw.json`.

      - name: Prepare design plan prompt
        id: design_plan_prepare
        if: ${{ inputs.stage == 'design' }}
        shell: bash
        env:
          RELAY_CONFIGURED: "true"
        run: |
          set -euo pipefail
          if [[ ! -s .codex-loop-stage-result.json ]]; then
            test -s codex-review-artifacts/design/design-clusters.raw.json
            codex-review design cluster \
              --in codex-review-artifacts/design/design-clusters.raw.json \
              --inventory codex-review-artifacts/design/design-inventory.json \
              --repo-path pr-head \
              --out codex-review-artifacts/design/design-clusters.json
            codex-review design collect-analyses \
              --artifacts codex-review-artifacts/design/design-clusters.json \
              --out codex-review-artifacts/design/design-analyses.json
            codex-review design build-plan-prompt \
              --pr-context codex-review-artifacts/design/design-context.json \
              --inventory codex-review-artifacts/design/design-inventory.json \
              --result codex-review-artifacts/design/design-analyses.json \
              --out codex-review-artifacts/design/design-plan.prompt.md
            if [[ "${RELAY_CONFIGURED}" == "true" ]]; then
              echo "needs_design_plan_model=true" >> "${GITHUB_OUTPUT}"
            else
              codex-review design default-plan \
                --pr-context codex-review-artifacts/design/design-context.json \
                --inventory codex-review-artifacts/design/design-inventory.json \
                --out codex-review-artifacts/design/design-plan.raw.json
              echo "needs_design_plan_model=false" >> "${GITHUB_OUTPUT}"
            fi
          fi

      - name: Run live Codex design plan
        if: ${{ inputs.stage == 'design' && steps.design_plan_prepare.outputs.needs_design_plan_model == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_RELAY_API_KEY }}
          responses-api-endpoint: https://relay-ai.dongwontuna.net/v1/responses
          prompt: |
            Read `codex-review-artifacts/design/design-plan.prompt.md` and inspect `pr-head` as needed.
            Write only schema-valid JSON for `design-plan.v1` to `codex-review-artifacts/design/design-plan.raw.json`.
            Do not post comments, push commits, access secrets, or modify files outside `codex-review-artifacts/design/design-plan.raw.json`.

      - name: Prepare design chief prompt
        id: design_chief_prepare
        if: ${{ inputs.stage == 'design' }}
        shell: bash
        env:
          RELAY_CONFIGURED: "true"
        run: |
          set -euo pipefail
          if [[ ! -s .codex-loop-stage-result.json ]]; then
            test -s codex-review-artifacts/design/design-plan.raw.json
            codex-review design validate-plan \
              --in codex-review-artifacts/design/design-plan.raw.json \
              --pr-context codex-review-artifacts/design/design-context.json \
              --repo-path pr-head \
              --out codex-review-artifacts/design-state-bundle/design-plan.json
            cp codex-review-artifacts/design/design-context.json codex-review-artifacts/design-state-bundle/design-context.json
            codex-review design_chief build-chief-prompt \
              --in codex-review-artifacts/design-state-bundle/design-plan.json \
              --inventory codex-review-artifacts/design/design-inventory.json \
              --pr-context codex-review-artifacts/design/design-context.json \
              --out codex-review-artifacts/design-state-bundle/chief.prompt.md
            if [[ "${RELAY_CONFIGURED}" == "true" ]]; then
              echo "needs_design_chief_model=true" >> "${GITHUB_OUTPUT}"
            else
              codex-review design_chief default-result \
                --design-plan codex-review-artifacts/design-state-bundle/design-plan.json \
                --out codex-review-artifacts/design-state-bundle/chief-decision.raw.json
              echo "needs_design_chief_model=false" >> "${GITHUB_OUTPUT}"
            fi
          fi

      - name: Run live Codex design chief
        if: ${{ inputs.stage == 'design' && steps.design_chief_prepare.outputs.needs_design_chief_model == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_RELAY_API_KEY }}
          responses-api-endpoint: https://relay-ai.dongwontuna.net/v1/responses
          prompt: |
            Read `codex-review-artifacts/design-state-bundle/chief.prompt.md` and inspect `pr-head` as needed.
            Write only schema-valid JSON for `design-chief-decision.v1` to `codex-review-artifacts/design-state-bundle/chief-decision.raw.json`.
            Do not post comments, push commits, access secrets, or modify files outside `codex-review-artifacts/design-state-bundle/chief-decision.raw.json`.

      - name: Complete design stage state
        if: ${{ inputs.stage == 'design' }}
        shell: bash
        env:
          INPUT_CORRELATION_ID: ${{ inputs.correlation_id }}
          INPUT_ITERATION: ${{ inputs.iteration }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [[ ! -s .codex-loop-stage-result.json ]]; then
            test -s codex-review-artifacts/design-state-bundle/chief-decision.raw.json
            codex-review design_chief validate \
              --in codex-review-artifacts/design-state-bundle/chief-decision.raw.json \
              --design-plan codex-review-artifacts/design-state-bundle/design-plan.json \
              --repo-path pr-head \
              --out codex-review-artifacts/design-state-bundle/chief-decision.json
            codex-review design_chief publish --dry-run \
              --design-plan codex-review-artifacts/design-state-bundle/design-plan.json \
              --in codex-review-artifacts/design-state-bundle/chief-decision.json \
              --pr-context codex-review-artifacts/common/pr-context.json \
              --out codex-review-artifacts/design-state-bundle/publish-report.json
            codex-review design_chief route \
              --in codex-review-artifacts/design-state-bundle/chief-decision.json \
              --out codex-review-artifacts/design-state-bundle/route.json
            route="$(jq -er '.route' codex-review-artifacts/design-state-bundle/route.json)"
            case "${route}" in
              run_fix_dispatch)
                next_stage="fix"; lgtm="false"; should_redispatch="true"; terminal_reason="" ;;
              stop_needs_human)
                next_stage=""; lgtm="false"; should_redispatch="false"; terminal_reason="policy_rejected" ;;
              stop_noop)
                next_stage=""; lgtm="false"; should_redispatch="false"; terminal_reason="no_fix_needed" ;;
              *)
                next_stage=""; lgtm="false"; should_redispatch="false"; terminal_reason="model_output_invalid" ;;
            esac
            jq -n \
              --arg next_stage "${next_stage}" \
              --arg terminal_reason "${terminal_reason}" \
              --arg updated_head_sha "" \
              --argjson lgtm "${lgtm}" \
              --argjson should_redispatch "${should_redispatch}" \
              '{next_stage:$next_stage, lgtm:$lgtm, should_redispatch:$should_redispatch, terminal_reason:$terminal_reason, updated_head_sha:$updated_head_sha}' \
              > .codex-loop-stage-result.json
          fi

      - name: Commit and push validated fix
        id: push_commit
        if: ${{ inputs.stage == 'push' && steps.prepare_stage.outputs.needs_push_commit == 'true' && needs.setup-state.result == 'success' }}
        continue-on-error: true
        shell: bash
        env:
          PUSH_TOKEN: ${{ secrets.CODEX_LOOP_PAT }}
        run: |
          set -euo pipefail
          codex-review push commit-push \
            --in codex-review-artifacts/prior-state/merged-fix.json \
            --validation codex-review-artifacts/prior-state/validated-fix.json \
            --pr-context codex-review-artifacts/common/pr-context.json \
            --repo-path pr-head \
            --token "${PUSH_TOKEN}" \
            --out codex-review-artifacts/push/push-result.json

      - name: Complete push stage state
        if: ${{ inputs.stage == 'push' }}
        shell: bash
        env:
          INPUT_CORRELATION_ID: ${{ inputs.correlation_id }}
          INPUT_ITERATION: ${{ inputs.iteration }}
          NEEDS_PUSH_COMMIT: ${{ steps.prepare_stage.outputs.needs_push_commit }}
          COMMIT_PUSH_OUTCOME: ${{ steps.push_commit.outcome }}
        run: |
          set -euo pipefail
          if [[ -s .codex-loop-stage-result.json ]]; then
            exit 0
          fi

          push_result="codex-review-artifacts/push/push-result.json"
          terminal_reason=""
          next_stage=""
          should_redispatch="false"
          lgtm="false"
          updated_head_sha=""

          if [[ "${NEEDS_PUSH_COMMIT}" != "true" ]]; then
            terminal_reason="push_not_ready"
          elif [[ "${COMMIT_PUSH_OUTCOME}" == "failure" || ! -s "${push_result}" ]]; then
            terminal_reason="push_failed"
          else
            pushed="$(jq -r 'if (.pushed | type) == "boolean" then .pushed else false end | tostring' "${push_result}")"
            verified="$(jq -r 'if (.verified | type) == "boolean" then .verified else false end | tostring' "${push_result}")"
            status="$(jq -r '.status // "push_failed"' "${push_result}")"
            result_updated_head_sha="$(jq -r '.updated_head_sha // ""' "${push_result}")"
            remote_head_sha="$(jq -r '.remote_head_sha // ""' "${push_result}")"
            if [[ "${pushed}" == "true" && "${verified}" == "true" && -n "${result_updated_head_sha}" && "${remote_head_sha}" == "${result_updated_head_sha}" ]]; then
              next_stage="review"
              should_redispatch="true"
              updated_head_sha="${result_updated_head_sha}"
              cp "${push_result}" codex-review-artifacts/push-state-bundle/push-result.json
            else
              case "${status}" in
                pushed_unverified) terminal_reason="pushed_unverified" ;;
                push_failed) terminal_reason="push_failed" ;;
                stale_head) terminal_reason="stale_head" ;;
                no_fix|empty_patch|no_fix_changes|no_diff_repeat|no-diff-repeat) terminal_reason="no_fix_changes" ;;
                validation_failed|tests_failed|semantic_safety_missing|semantic_safety_rejected|semantic_safety_hash_mismatch) terminal_reason="${status}" ;;
                *) terminal_reason="push_failed" ;;
              esac
            fi
          fi

          jq -n \
            --arg next_stage "${next_stage}" \
            --arg terminal_reason "${terminal_reason}" \
            --arg updated_head_sha "${updated_head_sha}" \
            --argjson lgtm "${lgtm}" \
            --argjson should_redispatch "${should_redispatch}" \
            '{next_stage:$next_stage, lgtm:$lgtm, should_redispatch:$should_redispatch, terminal_reason:$terminal_reason, updated_head_sha:$updated_head_sha}' \
            > .codex-loop-stage-result.json

      - name: Run live Codex fix agents serially
        if: ${{ inputs.stage == 'fix' && steps.prepare_stage.outputs.needs_fix_agent_model == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_RELAY_API_KEY }}
          responses-api-endpoint: https://relay-ai.dongwontuna.net/v1/responses
          prompt: |
            Inspect every `codex-review-artifacts/fix_dispatch/agents/*/prompt.md` file and the checked-out PR head at `pr-head`.
            For each agent directory, write only schema-valid JSON for `fix-dispatch-agent-result.v1` to that directory's `result.json`.
            Use the requested `edits` search/replace output contract when possible. Do not post comments, push commits, access secrets, or modify files outside `codex-review-artifacts/fix_dispatch/agents/*/result.json`.

      - name: Prepare fix merge
        id: fix_merge_prepare
        if: ${{ inputs.stage == 'fix' }}
        shell: bash
        env:
          RELAY_CONFIGURED: "true"
        run: |
          set -euo pipefail
          if [[ ! -s .codex-loop-stage-result.json ]]; then
            while IFS= read -r task_file; do
              task_dir="$(dirname "${task_file}")"
              test -s "${task_dir}/result.json"
              codex-review fix_dispatch validate-agent-result \
                --inventory "${task_file}" \
                --in "${task_dir}/result.json" \
                --repo-path pr-head \
                --out "${task_dir}/result.validated.json"
            done < <(find codex-review-artifacts/fix_dispatch/agents -name task.json -print | sort)
            codex-review fix_dispatch collect \
              --inventory codex-review-artifacts/fix_dispatch/manifest.json \
              --artifacts codex-review-artifacts/fix_dispatch/agents \
              --out codex-review-artifacts/fix_dispatch/collection.json
            mkdir -p codex-review-artifacts/fix_merge codex-review-artifacts/push
            codex-review fix_merge premerge \
              --in codex-review-artifacts/fix_dispatch/collection.json \
              --repo-path pr-head \
              --out codex-review-artifacts/fix_merge/premerge-report.json
            codex-review fix_merge prepare-merge-model \
              --inventory codex-review-artifacts/fix_merge/premerge-report.json \
              --in codex-review-artifacts/fix_dispatch/collection.json \
              --pr-context codex-review-artifacts/fix-context/pr-context.json \
              --docs-context codex-review-artifacts/fix-context/docs-context.md \
              --repo-path pr-head \
              --prompt-out codex-review-artifacts/fix_merge/merge-prompt.md \
              --raw-out codex-review-artifacts/fix_merge/merged-fix.raw.json \
              --out codex-review-artifacts/fix_merge/merge-route.json
            needs_merge_model="$(jq -er '.needs_model | tostring' codex-review-artifacts/fix_merge/merge-route.json)"
            if [[ "${needs_merge_model}" == "true" && "${RELAY_CONFIGURED}" == "true" ]]; then
              echo "needs_fix_merge_model=true" >> "${GITHUB_OUTPUT}"
            else
              echo "needs_fix_merge_model=false" >> "${GITHUB_OUTPUT}"
              if [[ "${needs_merge_model}" == "true" ]]; then
                codex-review fix_merge default-merged-fix \
                  --inventory codex-review-artifacts/fix_merge/premerge-report.json \
                  --out codex-review-artifacts/fix_merge/merged-fix.raw.json
              fi
            fi
          fi

      - name: Run live Codex fix merge
        if: ${{ inputs.stage == 'fix' && steps.fix_merge_prepare.outputs.needs_fix_merge_model == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_RELAY_API_KEY }}
          responses-api-endpoint: https://relay-ai.dongwontuna.net/v1/responses
          prompt: |
            Read `codex-review-artifacts/fix_merge/merge-prompt.md` and inspect `pr-head` as needed.
            Write only schema-valid JSON for `fix-merge-merged-fix.v1` to `codex-review-artifacts/fix_merge/merged-fix.raw.json`.
            The output must remain compatible with `fix_merge validate`, `push validate-fix`, and the later Task 4 push path.
            Do not post comments, push commits, access secrets, or modify files outside `codex-review-artifacts/fix_merge/merged-fix.raw.json`.

      - name: Prepare fix semantic safety
        id: fix_semantic_prepare
        if: ${{ inputs.stage == 'fix' }}
        shell: bash
        env:
          RELAY_CONFIGURED: "true"
        run: |
          set -euo pipefail
          if [[ ! -s .codex-loop-stage-result.json ]]; then
            test -s codex-review-artifacts/fix_merge/merged-fix.raw.json
            codex-review fix_merge validate \
              --inventory codex-review-artifacts/fix_merge/premerge-report.json \
              --chief-decision codex-review-artifacts/prior-state/chief-decision.json \
              --in codex-review-artifacts/fix_merge/merged-fix.raw.json \
              --repo-path pr-head \
              --out codex-review-artifacts/fix_merge/merged-fix.json
            codex-review fix_merge build-semantic-safety-prompt \
              --in codex-review-artifacts/fix_merge/merged-fix.json \
              --pr-context codex-review-artifacts/fix-context/pr-context.json \
              --docs-context codex-review-artifacts/fix-context/docs-context.md \
              --repo-path pr-head \
              --out codex-review-artifacts/fix_merge/semantic-safety-prompt.md
            patch_hash="$(jq -r '(.patch // .patch_text // "")' codex-review-artifacts/fix_merge/merged-fix.json | shasum -a 256 | cut -d ' ' -f 1)"
            status="$(jq -er '.status | strings' codex-review-artifacts/fix_merge/merged-fix.json)"
            needs_semantic_model="true"
            if [[ "${status}" == "no_fix" || "${status}" == "blocked" || "${patch_hash}" == "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]]; then
              needs_semantic_model="false"
              jq -n --arg patch_hash "${patch_hash}" \
                '{schema_version:"fix-merge-semantic-patch-safety.v1", status:"not_required", approved:false, patch_hash:$patch_hash, summary:"No ready patch requires semantic push approval.", blocking_reason:null, reviewed_criteria:[], semantic_findings:[], commit_plan:[]}' \
                > codex-review-artifacts/fix_merge/semantic-safety.raw.json
            elif [[ "${RELAY_CONFIGURED}" != "true" ]]; then
              needs_semantic_model="false"
              jq -n --arg patch_hash "${patch_hash}" \
                '{schema_version:"fix-merge-semantic-patch-safety.v1", status:"rejected", approved:false, patch_hash:$patch_hash, summary:"Semantic safety model is skipped without live autofix.", blocking_reason:"live autofix is disabled", reviewed_criteria:["exact patch hash computed", "push withheld"], semantic_findings:[], commit_plan:[]}' \
                > codex-review-artifacts/fix_merge/semantic-safety.raw.json
            fi
            echo "needs_semantic_model=${needs_semantic_model}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Run live Codex semantic safety
        if: ${{ inputs.stage == 'fix' && steps.fix_semantic_prepare.outputs.needs_semantic_model == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_RELAY_API_KEY }}
          responses-api-endpoint: https://relay-ai.dongwontuna.net/v1/responses
          prompt: |
            Read `codex-review-artifacts/fix_merge/semantic-safety-prompt.md` and inspect `pr-head` as needed.
            Write only schema-valid JSON for `fix-merge-semantic-patch-safety.v1` to `codex-review-artifacts/fix_merge/semantic-safety.raw.json`.
            Do not post comments, push commits, access secrets, or modify files outside `codex-review-artifacts/fix_merge/semantic-safety.raw.json`.

      - name: Complete fix stage state
        if: ${{ inputs.stage == 'fix' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s .codex-loop-stage-result.json ]]; then
            test -s codex-review-artifacts/fix_merge/semantic-safety.raw.json
            codex-review fix_merge validate-semantic-safety \
              --in codex-review-artifacts/fix_merge/semantic-safety.raw.json \
              --inventory codex-review-artifacts/fix_merge/merged-fix.json \
              --out codex-review-artifacts/fix_merge/semantic-safety.json
            codex-review push validate-fix \
              --in codex-review-artifacts/fix_merge/merged-fix.json \
              --semantic-safety codex-review-artifacts/fix_merge/semantic-safety.json \
              --pr-context codex-review-artifacts/fix-context/pr-context.json \
              --repo-path pr-head \
              --out codex-review-artifacts/push/validated-fix.json
            codex-review push check-loop-budget \
              --in codex-review-artifacts/push/validated-fix.json \
              --result codex-review-artifacts/fix_merge/merged-fix.json \
              --design-plan codex-review-artifacts/prior-state/design-plan.json \
              --loop-state codex-loop-state.json \
              --out codex-review-artifacts/push/validated-fix.json
            cp codex-review-artifacts/fix_dispatch/manifest.json codex-review-artifacts/fix-state-bundle/manifest.json
            cp codex-review-artifacts/fix_merge/merged-fix.json codex-review-artifacts/fix-state-bundle/merged-fix.json
            cp codex-review-artifacts/push/validated-fix.json codex-review-artifacts/fix-state-bundle/validated-fix.json
            cp codex-review-artifacts/fix_merge/semantic-safety.json codex-review-artifacts/fix-state-bundle/semantic-safety.json
            validation_status="$(jq -er '.status | strings' codex-review-artifacts/push/validated-fix.json)"
            validated="$(jq -er '.validated | booleans | tostring' codex-review-artifacts/push/validated-fix.json)"
            loop_budget_ok="$(jq -r 'if has("loop_budget_ok") then .loop_budget_ok else true end | tostring' codex-review-artifacts/push/validated-fix.json)"
            next_stage=""
            lgtm="false"
            should_redispatch="false"
            terminal_reason=""
            if [[ "${validated}" == "true" && "${loop_budget_ok}" == "true" ]]; then
              next_stage="push"
              should_redispatch="true"
            else
              case "${validation_status}" in
                no_fix|empty_patch)
                  terminal_reason="no_fix_needed" ;;
                no_diff_repeat|no-diff-repeat|osc*|max_rounds_reached)
                  terminal_reason="no_fix_changes" ;;
                *)
                  terminal_reason="model_output_invalid" ;;
              esac
            fi
            jq -n \
              --arg next_stage "${next_stage}" \
              --arg terminal_reason "${terminal_reason}" \
              --arg updated_head_sha "" \
              --argjson lgtm "${lgtm}" \
              --argjson should_redispatch "${should_redispatch}" \
              '{next_stage:$next_stage, lgtm:$lgtm, should_redispatch:$should_redispatch, terminal_reason:$terminal_reason, updated_head_sha:$updated_head_sha}' \
              > .codex-loop-stage-result.json
          fi

      - name: Parse stage result JSON
        id: stage_outputs
        shell: bash
        env:
          INPUT_STAGE: ${{ inputs.stage }}
          INPUT_CORRELATION_ID: ${{ inputs.correlation_id }}
          INPUT_ITERATION: ${{ inputs.iteration }}
        run: |
          set -euo pipefail

          result_file=".codex-loop-stage-result.json"
          if [[ ! -s "${result_file}" ]]; then
            echo "missing-stage-result-json" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          next_stage="$(jq -er '.next_stage | strings' "${result_file}")"
          lgtm="$(jq -er '.lgtm | booleans | tostring' "${result_file}")"
          should_redispatch="$(jq -er '.should_redispatch | booleans | tostring' "${result_file}")"
          terminal_reason="$(jq -er '.terminal_reason | strings' "${result_file}")"
          updated_head_sha="$(jq -er '.updated_head_sha | strings' "${result_file}")"

          if [[ -n "${next_stage}" ]]; then
            case "${next_stage}" in
              review|design|fix|push) ;;
              *)
                echo "invalid-next-stage" >> "${GITHUB_STEP_SUMMARY}"
                exit 1
                ;;
            esac
          fi

          if [[ "${should_redispatch}" == "true" && -z "${next_stage}" ]]; then
            echo "redispatch-missing-next-stage" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          if [[ "${should_redispatch}" == "false" && "${lgtm}" == "false" && -z "${terminal_reason}" ]]; then
            echo "terminal-reason-required" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          case "${INPUT_STAGE}" in
            review) state_artifact_name="codex-loop-review-state-${INPUT_CORRELATION_ID}-${INPUT_ITERATION}" ;;
            design) state_artifact_name="codex-loop-design-state-${INPUT_CORRELATION_ID}-${INPUT_ITERATION}" ;;
            fix) state_artifact_name="codex-loop-fix-state-${INPUT_CORRELATION_ID}-${INPUT_ITERATION}" ;;
            push) state_artifact_name="codex-loop-push-state-${INPUT_CORRELATION_ID}-${INPUT_ITERATION}" ;;
            *) state_artifact_name="" ;;
          esac

          case "${INPUT_STAGE}" in
            review)
              rm -rf codex-review-artifacts/stage-state
              cp -R codex-review-artifacts/review-state-bundle codex-review-artifacts/stage-state
              ;;
            design)
              rm -rf codex-review-artifacts/stage-state
              cp -R codex-review-artifacts/design-state-bundle codex-review-artifacts/stage-state
              ;;
            fix)
              rm -rf codex-review-artifacts/stage-state
              cp -R codex-review-artifacts/fix-state-bundle codex-review-artifacts/stage-state
              ;;
            push)
              rm -rf codex-review-artifacts/stage-state
              cp -R codex-review-artifacts/push-state-bundle codex-review-artifacts/stage-state
              ;;
          esac

          {
            echo "next_stage=${next_stage}"
            echo "lgtm=${lgtm}"
            echo "should_redispatch=${should_redispatch}"
            echo "terminal_reason=${terminal_reason}"
            echo "updated_head_sha=${updated_head_sha}"
            echo "state_artifact_name=${state_artifact_name}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Codex loop stage"
            echo "stage=${INPUT_STAGE}"
            echo "next_stage=${next_stage}"
            echo "lgtm=${lgtm}"
            echo "should_redispatch=${should_redispatch}"
            echo "terminal_reason=${terminal_reason}"
            echo "state_artifact_name=${state_artifact_name}"
            echo "updated_head_sha=${updated_head_sha}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload active stage state artifact
        if: ${{ steps.stage_outputs.outputs.state_artifact_name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage_outputs.outputs.state_artifact_name }}
          path: codex-review-artifacts/stage-state
          retention-days: 7

  finalize:
    name: Finalize Loop
    needs: [validate, setup-state, run-stage]
    if: ${{ always() }}
    runs-on:
      group: "Home Server Runners"
      labels: dongwontuna-labs-runner
    permissions:
      contents: write
      pull-requests: write
      actions: read
    outputs:
      next_stage: ${{ steps.final_outputs.outputs.next_stage }}
      lgtm: ${{ steps.final_outputs.outputs.lgtm }}
      should_redispatch: ${{ steps.final_outputs.outputs.should_redispatch }}
      terminal_reason: ${{ steps.final_outputs.outputs.terminal_reason }}
      state_run_id: ${{ steps.final_outputs.outputs.state_run_id }}
      state_artifact_name: ${{ steps.final_outputs.outputs.state_artifact_name }}
      updated_head_sha: ${{ steps.final_outputs.outputs.updated_head_sha }}
    steps:
      - name: Resolve final loop candidate
        id: resolve
        shell: bash
        env:
          VALIDATE_RESULT: ${{ needs.validate.result }}
          VALIDATE_REASON: ${{ needs.validate.outputs.terminal_reason }}
          SETUP_RESULT: ${{ needs.setup-state.result }}
          SETUP_STATE_ARTIFACT_NAME: ${{ needs.setup-state.outputs.state_artifact_name }}
          RUN_STAGE_RESULT: ${{ needs.run-stage.result }}
          RUN_STAGE_NEXT_STAGE: ${{ needs.run-stage.outputs.next_stage }}
          RUN_STAGE_LGTM: ${{ needs.run-stage.outputs.lgtm }}
          RUN_STAGE_REDISPATCH: ${{ needs.run-stage.outputs.should_redispatch }}
          RUN_STAGE_REASON: ${{ needs.run-stage.outputs.terminal_reason }}
          RUN_STAGE_UPDATED_HEAD_SHA: ${{ needs.run-stage.outputs.updated_head_sha }}
          RUN_STAGE_STATE_ARTIFACT_NAME: ${{ needs.run-stage.outputs.state_artifact_name }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          INPUT_BASE_REF: ${{ inputs.base_ref }}
          INPUT_STAGE: ${{ inputs.stage }}
          INPUT_ITERATION: ${{ inputs.iteration }}
          INPUT_CORRELATION_ID: ${{ inputs.correlation_id }}
          INPUT_REQUESTED_BY: ${{ inputs.requested_by }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          next_stage="${RUN_STAGE_NEXT_STAGE:-}"
          lgtm="${RUN_STAGE_LGTM:-false}"
          should_redispatch="${RUN_STAGE_REDISPATCH:-false}"
          terminal_reason="${RUN_STAGE_REASON:-}"
          state_run_id="${CURRENT_RUN_ID}"
          state_artifact_name="${RUN_STAGE_STATE_ARTIFACT_NAME:-${SETUP_STATE_ARTIFACT_NAME:-}}"
          updated_head_sha="${RUN_STAGE_UPDATED_HEAD_SHA:-}"
          dispatch_candidate="false"
          next_iteration="$(( INPUT_ITERATION + 1 ))"
          next_head_sha="${INPUT_HEAD_SHA}"

          if [[ "${VALIDATE_RESULT}" != "success" ]]; then
            terminal_reason="${VALIDATE_REASON:-validation-failed}"
            next_stage=""
            lgtm="false"
            should_redispatch="false"
            state_artifact_name=""
            updated_head_sha=""
          elif [[ "${SETUP_RESULT}" != "success" ]]; then
            terminal_reason="state-setup-failed"
            next_stage=""
            lgtm="false"
            should_redispatch="false"
            state_artifact_name=""
            updated_head_sha=""
          elif [[ "${RUN_STAGE_RESULT}" != "success" ]]; then
            terminal_reason="${RUN_STAGE_REASON:-stage-failed}"
            lgtm="false"
            should_redispatch="false"
            updated_head_sha=""
          fi

          if [[ "${INPUT_STAGE}" == "push" && "${should_redispatch}" == "true" ]]; then
            if [[ -z "${updated_head_sha}" ]]; then
              terminal_reason="missing-updated-head-sha"
              next_stage=""
              should_redispatch="false"
            else
              next_head_sha="${updated_head_sha}"
            fi
          fi

          if [[ "${should_redispatch}" == "true" ]]; then
            case "${next_stage}" in
              review|design|fix|push) ;;
              *)
                terminal_reason="invalid-next-stage"
                next_stage=""
                should_redispatch="false"
                ;;
            esac
          fi

          if [[ "${should_redispatch}" == "true" && -n "${state_artifact_name}" ]]; then
            dispatch_candidate="true"
          fi

          jq -n \
            --arg repository "${REPOSITORY}" \
            --arg pr_number "${INPUT_PR_NUMBER}" \
            --arg head_sha "${next_head_sha}" \
            --arg base_ref "${INPUT_BASE_REF}" \
            --arg stage "${next_stage}" \
            --arg iteration "${next_iteration}" \
            --arg correlation_id "${INPUT_CORRELATION_ID}" \
            --arg requested_by "${INPUT_REQUESTED_BY}" \
            --arg state_run_id "${state_run_id}" \
            --arg state_artifact_name "${state_artifact_name}" \
            --arg updated_head_sha "${updated_head_sha}" \
            --arg status "emitted" \
            '{repository:$repository, pr_number:($pr_number|tonumber), head_sha:$head_sha, base_ref:$base_ref, stage:$stage, iteration:($iteration|tonumber), correlation_id:$correlation_id, requested_by:$requested_by, state_run_id:$state_run_id, state_artifact_name:$state_artifact_name, updated_head_sha:$updated_head_sha, status:$status}' \
            > .codex-loop-dispatch-payload.json

          jq -n --arg event_type "codex-loop-continuation" --slurpfile client_payload .codex-loop-dispatch-payload.json \
            '{event_type:$event_type, client_payload:$client_payload[0]}' \
            > .codex-loop-repository-dispatch.json

          {
            echo "next_stage=${next_stage}"
            echo "lgtm=${lgtm}"
            echo "should_redispatch=${should_redispatch}"
            echo "terminal_reason=${terminal_reason}"
            echo "state_run_id=${state_run_id}"
            echo "state_artifact_name=${state_artifact_name}"
            echo "updated_head_sha=${updated_head_sha}"
            echo "dispatch_candidate=${dispatch_candidate}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Codex loop finalize candidate"
            echo "stage=${INPUT_STAGE}"
            echo "next_stage=${next_stage}"
            echo "lgtm=${lgtm}"
            echo "should_redispatch=${should_redispatch}"
            echo "terminal_reason=${terminal_reason}"
            echo "state_run_id=${state_run_id}"
            echo "state_artifact_name=${state_artifact_name}"
            echo "updated_head_sha=${updated_head_sha}"
            echo "dispatch_candidate=${dispatch_candidate}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Dispatch live continuation repository_dispatch
        id: dispatch_continuation
        if: ${{ steps.resolve.outputs.dispatch_candidate == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CODEX_LOOP_PAT }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api --method POST "repos/${REPOSITORY}/dispatches" --input .codex-loop-repository-dispatch.json
          echo "dispatched=true" >> "${GITHUB_OUTPUT}"

      - name: Emit final loop outputs
        id: final_outputs
        if: ${{ always() }}
        shell: bash
        env:
          RESOLVE_NEXT_STAGE: ${{ steps.resolve.outputs.next_stage }}
          RESOLVE_LGTM: ${{ steps.resolve.outputs.lgtm }}
          RESOLVE_REDISPATCH: ${{ steps.resolve.outputs.should_redispatch }}
          RESOLVE_TERMINAL_REASON: ${{ steps.resolve.outputs.terminal_reason }}
          RESOLVE_STATE_RUN_ID: ${{ steps.resolve.outputs.state_run_id }}
          RESOLVE_STATE_ARTIFACT_NAME: ${{ steps.resolve.outputs.state_artifact_name }}
          RESOLVE_UPDATED_HEAD_SHA: ${{ steps.resolve.outputs.updated_head_sha }}
          DISPATCH_CANDIDATE: ${{ steps.resolve.outputs.dispatch_candidate }}
          DISPATCHED: ${{ steps.dispatch_continuation.outputs.dispatched }}
        run: |
          set -euo pipefail
          next_stage="${RESOLVE_NEXT_STAGE:-}"
          lgtm="${RESOLVE_LGTM:-false}"
          should_redispatch="${RESOLVE_REDISPATCH:-false}"
          terminal_reason="${RESOLVE_TERMINAL_REASON:-}"
          state_run_id="${RESOLVE_STATE_RUN_ID:-}"
          state_artifact_name="${RESOLVE_STATE_ARTIFACT_NAME:-}"
          updated_head_sha="${RESOLVE_UPDATED_HEAD_SHA:-}"

          if [[ "${DISPATCH_CANDIDATE}" == "true" && "${DISPATCHED}" != "true" ]]; then
            next_stage=""
            should_redispatch="false"
            terminal_reason="dispatch-not-emitted"
          fi

          {
            echo "next_stage=${next_stage}"
            echo "lgtm=${lgtm}"
            echo "should_redispatch=${should_redispatch}"
            echo "terminal_reason=${terminal_reason}"
            echo "state_run_id=${state_run_id}"
            echo "state_artifact_name=${state_artifact_name}"
            echo "updated_head_sha=${updated_head_sha}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Codex loop finalize"
            echo "next_stage=${next_stage}"
            echo "lgtm=${lgtm}"
            echo "should_redispatch=${should_redispatch}"
            echo "terminal_reason=${terminal_reason}"
            echo "state_run_id=${state_run_id}"
            echo "state_artifact_name=${state_artifact_name}"
            echo "updated_head_sha=${updated_head_sha}"
          } >> "${GITHUB_STEP_SUMMARY}"
